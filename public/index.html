<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市学校供餐管理系统</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; }
        a { text-decoration: none; color: inherit; }

        /* Login Page */
        .login-wrap { min-height: 100vh; display: flex; }
        .login-left { flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; justify-content: center; padding: 60px; color: white; }
        .login-right { flex: 1; display: flex; align-items: center; justify-content: center; background: white; }
        .login-left h1 { font-size: 38px; font-weight: 600; margin-bottom: 16px; line-height: 1.4; }
        .login-left p { font-size: 17px; opacity: 0.9; }
        .login-left .features { margin-top: 50px; }
        .login-left .feature-item { display: flex; align-items: center; margin-bottom: 18px; font-size: 15px; }
        .login-left .feature-item::before { content: "✓"; width: 26px; height: 26px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 14px; font-size: 13px; flex-shrink: 0; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 48px 40px; width: 420px; }
        .login-card h2 { font-size: 24px; color: #333; margin-bottom: 6px; text-align: center; }
        .login-card .subtitle { text-align: center; color: #999; font-size: 13px; margin-bottom: 28px; }
        .role-tabs { display: flex; background: #f5f7fa; border-radius: 10px; padding: 4px; margin-bottom: 24px; }
        .role-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; color: #666; cursor: pointer; border-radius: 8px; border: none; background: transparent; transition: all 0.2s; }
        .role-tab.active { background: white; color: #667eea; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; font-size: 14px; border: 2px solid #e8ecf0; border-radius: 8px; outline: none; transition: border-color 0.2s; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { border-color: #667eea; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.35); }
        .login-error { color: #e74c3c; font-size: 13px; margin-top: 8px; text-align: center; display: none; }
        .login-error.show { display: block; }

        /* Layout */
        .app-layout { display: flex; min-height: 100vh; }
        .academic-year-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; }
        .academic-year-info { display: flex; align-items: center; gap: 8px; }
        .academic-year-label { font-size: 14px; color: #495057; font-weight: 500; }
        .academic-year-select { padding: 6px 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; background: white; cursor: pointer; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .main-content { margin-left: 220px; flex: 1; }
        .sidebar { width: 220px; background: #1e1e2e; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-logo { padding: 24px 20px; font-size: 16px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo span { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 12px 0; }
        .nav-item { padding: 12px 20px; font-size: 14px; color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(102,126,234,0.2); color: #667eea; border-left-color: #667eea; }
        .nav-group { font-size: 11px; color: rgba(255,255,255,0.4); padding: 16px 20px 6px; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; }
        .sidebar-user .name { font-weight: 500; margin-bottom: 4px; }
        .sidebar-user .role { font-size: 11px; color: rgba(255,255,255,0.5); }
        .sidebar-user .logout-btn { margin-top: 10px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%; }
        .sidebar-user .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .main-content { flex: 1; margin-left: 220px; padding: 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 22px; font-weight: 600; color: #333; }
        .page-breadcrumb { font-size: 13px; color: #999; margin-top: 4px; }

        /* Cards & Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #333; }
        .stat-card .value.red { color: #e74c3c; }
        .stat-card .value.yellow { color: #f39c12; }
        .stat-card .value.green { color: #27ae60; }
        .stat-card .value.purple { color: #667eea; }

        /* Tables */
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card-header { padding: 18px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { font-size: 15px; font-weight: 600; color: #333; }
        .card-body { padding: 20px 24px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #eee; white-space: nowrap; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-green { background: #e8f8f0; color: #27ae60; }
        .badge-purple { background: #f3e8ff; color: #7c3aed; }
        .badge-yellow { background: #fef9e7; color: #f39c12; }
        .badge-red { background: #fde8e8; color: #e74c3c; }
        .badge-blue { background: #e8f0fe; color: #667eea; }
        .badge-gray { background: #f0f0f0; color: #888; }

        /* Status Badge */
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-default { background: #f0f0f0; color: #666; }
        .status-warning { background: #fef9e7; color: #f39c12; }
        .status-success { background: #e8f8f0; color: #27ae60; }
        .status-danger { background: #fde8e8; color: #e74c3c; }
        .status-info { background: #e8f0fe; color: #667eea; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #fde8e8; color: #e74c3c; }
        .btn-danger:hover { background: #fdd; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-small { padding: 5px 12px; font-size: 12px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Forms */
        .form-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; border-radius: 16px; width: 90%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-wide { max-width: 960px; }
        .modal-field-view { padding: 10px 14px; background: #f8f9fa; border-radius: 8px; color: #333; font-size: 14px; min-height: 42px; display: flex; align-items: center; }
        .modal-field-view.empty { color: #bbb; font-style: italic; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 16px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; line-height: 1; }
        .modal-close:hover { color: #333; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 10px; }
        .modal-lg { max-width: 720px; }
        .form-group.full { grid-column: 1 / -1; }

        /* Selection Form Styles */
        .selection-form { padding: 20px 24px; }
        .selection-form .form-group { margin-bottom: 18px; }
        .selection-form .form-group label { display: block; font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; }
        .selection-form .form-group label .required { color: #e74c3c; }
        .selection-form .form-group input,
        .selection-form .form-group select,
        .selection-form .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; box-sizing: border-box; }
        .selection-form .form-group input:focus,
        .selection-form .form-group select:focus,
        .selection-form .form-group textarea:focus { outline: none; border-color: #667eea; }
        .selection-form .form-group input:disabled,
        .selection-form .form-group select:disabled,
        .selection-form .form-group textarea:disabled { background: #f5f5f5; color: #999; }
        .selection-form .form-group textarea { resize: vertical; }
        .selection-form .form-hint { font-size: 12px; color: #888; margin: 0; padding: 8px 0; }
        .selection-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .selection-form .modal-footer { padding: 16px 0 0 0; margin-top: 20px; border-top: 1px solid #f0f0f0; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .tab { padding: 10px 20px; border: none; background: none; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: #667eea; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 500; }

        /* Workflow Stepper */
        .workflow-stepper { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; margin-bottom: 24px; background: white; border-radius: 12px; padding: 24px; }
        .step-item { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
        .step-indicator { width: 36px; height: 36px; border-radius: 50%; background: #e0e0e0; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; z-index: 1; transition: all 0.3s; }
        .step-item.completed .step-indicator { background: #27ae60; cursor: pointer; }
        .step-item.completed .step-indicator:hover { background: #219a52; }
        .step-item.current .step-indicator { background: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.3); }
        .step-label { margin-top: 8px; font-size: 12px; color: #888; text-align: center; white-space: nowrap; }
        .step-item.current .step-label { color: #667eea; font-weight: 500; }
        .step-item.completed .step-label { color: #27ae60; }
        .step-line { position: absolute; top: 18px; left: calc(50% + 20px); width: calc(100% - 40px); height: 3px; background: #e0e0e0; z-index: 0; }
        .step-item.completed .step-line { background: #27ae60; }

        /* Workflow Section */
        .workflow-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .workflow-section h4 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .workflow-section p { font-size: 14px; color: #666; margin-bottom: 12px; }
        .info-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .info-item span { color: #333; }

        /* Tag/Badge for warning levels */
        .warn-badge { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; margin-right: 6px; }
        .warn-green { background: #27ae60; }
        .warn-yellow { background: #f39c12; }
        .warn-red { background: #e74c3c; }

        /* Search/Filter bar */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .search-input { padding: 9px 14px; border: 2px solid #e8ecf0; border-radius: 8px; font-size: 13px; outline: none; min-width: 220px; font-family: inherit; }
        .search-input:focus { border-color: #667eea; }
        select.filter-select { padding: 9px 14px; border: 2px solid #e8ecf0; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; background: white; }

        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; }
        .pagination button { padding: 6px 12px; border: 1px solid #e0e0e0; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .pagination button:hover { background: #f5f5f5; }
        .pagination button.active { background: #667eea; color: white; border-color: #667eea; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Tabs in content */
        .content-tabs { display: flex; gap: 0; border-bottom: 2px solid #f0f0f0; margin-bottom: 20px; }
        .content-tab { padding: 10px 20px; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .content-tab:hover { color: #333; }
        .content-tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }

        /* Toast notification */
        .toast { position: fixed; top: 20px; right: 20px; background: white; border-radius: 10px; padding: 14px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); font-size: 14px; z-index: 2000; display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #27ae60; }
        .toast.error { border-left: 4px solid #e74c3c; }
        .toast.info { border-left: 4px solid #667eea; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-logo span, .sidebar-user, .nav-item span, .nav-group { display: none; }
            .main-content { margin-left: 60px; }
            .login-wrap { flex-direction: column; }
            .login-left { padding: 30px; }
            .login-left .features { display: none; }
            .login-card { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, createContext, useContext } = React;

        // ============ API Helper ============
        const API = '/api';

        async function apiFetch(path, options = {}) {
            const token = localStorage.getItem('token');
            const isFormData = options.body instanceof FormData;
            const res = await fetch(API + path, {
                ...options,
                headers: {
                    ...(isFormData ? {} : { 'Content-Type': 'application/json' }),
                    ...(token ? { Authorization: `Bearer ${token}` } : {}),
                    ...options.headers
                }
            });
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                // Only reload if user was already logged in (session timeout)
                // Don't reload if login just failed (no existing token)
                if (token) {
                    window.location.reload();
                }
                return null;
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '请求失败');
            return data;
        }

        // ============ Auth Context ============
        const AuthContext = createContext(null);
        const useAuth = () => useContext(AuthContext);

        function AuthProvider({ children }) {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('user') || 'null'));
            const [loading, setLoading] = useState(false);

            const login = async (username, password, role) => {
                setLoading(true);
                try {
                    const data = await apiFetch('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password, role })
                    });
                    if (!data) return { success: false, error: '登录失败' };
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setUser(data.user);
                    return { success: true };
                } catch (e) {
                    return { success: false, error: e.message };
                } finally {
                    setLoading(false);
                }
            };

            const logout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setUser(null);
            };

            return (
                <AuthContext.Provider value={{ user, login, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        // ============ Academic Year Context ============
        const AcademicYearContext = createContext(null);
        const useAcademicYear = () => useContext(AcademicYearContext);

        function AcademicYearProvider({ children }) {
            const [academicYears, setAcademicYears] = useState([]);
            const [yearCounts, setYearCounts] = useState({});
            const [currentYear, setCurrentYear] = useState(() => {
                const stored = localStorage.getItem('academicYear');
                const userStr = localStorage.getItem('user');
                // 非admin用户不使用缓存，始终展示最新学年
                if (userStr) {
                    try { const u = JSON.parse(userStr); if (u.role && u.role !== 'admin') return ''; }
                    catch (_) { /* ignore */ }
                }
                return stored || '';
            });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                loadAcademicYear();
            }, []);

            const loadAcademicYear = async () => {
                try {
                    const data = await apiFetch('/config/academic-year');
                    if (data) {
                        const years = data.academicYears || [];
                        setAcademicYears(years);
                        setYearCounts(data.yearCounts || {});
                        // 最新学年始终为列表第一项（新学年prepend到最前）
                        const latestYear = years[0] || '';
                        // 非admin用户始终使用最新学年
                        const userStr = localStorage.getItem('user');
                        let isAdmin = false;
                        if (userStr) {
                            try { const u = JSON.parse(userStr); isAdmin = u.role === 'admin'; }
                            catch (_) { /* ignore */ }
                        }
                        if (isAdmin) {
                            // admin用户：如果缓存的学年不在列表中，或为空，则使用最新学年
                            if (!currentYear || !years.includes(currentYear)) {
                                const yr = latestYear || data.currentAcademicYear || '';
                                setCurrentYear(yr);
                                localStorage.setItem('academicYear', yr);
                            }
                        } else {
                            // 学校/供应商用户始终展示最新学年
                            if (latestYear && currentYear !== latestYear) {
                                setCurrentYear(latestYear);
                                localStorage.setItem('academicYear', latestYear);
                            }
                        }
                    }
                } catch (err) {
                    console.error('Failed to load academic year:', err);
                }
            };

            const changeAcademicYear = async (year) => {
                setCurrentYear(year);
                localStorage.setItem('academicYear', year);
            };

            const createNewYear = async (newYear, copyFromYear) => {
                setLoading(true);
                try {
                    const data = await apiFetch('/config/academic-year', {
                        method: 'POST',
                        body: JSON.stringify({ newAcademicYear: newYear, copyFromYear })
                    });
                    if (data) {
                        await loadAcademicYear();
                        setCurrentYear(newYear);
                        localStorage.setItem('academicYear', newYear);
                    }
                    return data;
                } finally {
                    setLoading(false);
                }
            };

            return (
                <AcademicYearContext.Provider value={{ academicYears, yearCounts, currentYear, changeAcademicYear, createNewYear, loading, refresh: loadAcademicYear }}>
                    {children}
                </AcademicYearContext.Provider>
            );
        }

        // ============ Academic Year Header ============
        function AcademicYearHeader() {
            const { user } = useAuth();
            const { academicYears, yearCounts, currentYear, changeAcademicYear, createNewYear, loading } = useAcademicYear();
            const [showNewYearModal, setShowNewYearModal] = useState(false);
            const [newYear, setNewYear] = useState('');
            const [copyFromYear, setCopyFromYear] = useState('');

            // 非admin用户不显示学年选择器
            if (user?.role !== 'admin') return null;

            const openNewYearModal = () => {
                if (academicYears.length > 0) {
                    const latest = academicYears[0];
                    const [s, e] = latest.split('-');
                    const ns = parseInt(s) + 1;
                    const ne = parseInt(e) + 1;
                    setNewYear(`${ns}-${ne}`);
                    setCopyFromYear(latest);
                }
                setShowNewYearModal(true);
            };

            const handleCreateYear = async () => {
                if (!newYear) {
                    alert('请输入新学年');
                    return;
                }
                if (!/^\d{4}-\d{4}$/.test(newYear)) {
                    alert('学年格式不正确，请输入如 2027-2028 的格式');
                    return;
                }
                const [s, e] = newYear.split('-').map(Number);
                if (e - s !== 1) {
                    alert('学年年份差应为1年，如 2027-2028');
                    return;
                }
                if (academicYears.includes(newYear)) {
                    alert('该学年已存在');
                    return;
                }
                const data = await createNewYear(newYear, copyFromYear);
                if (data) {
                    alert(data.message || '新学年已创建');
                    setShowNewYearModal(false);
                    setNewYear('');
                    setCopyFromYear('');
                }
            };

            const copyPreview = yearCounts[copyFromYear];
            const hasCopyData = copyPreview && (
                copyPreview.schoolCount > 0 || copyPreview.canteenCount > 0 ||
                copyPreview.ingredientSupplierCount > 0 || copyPreview.cateringCompanyCount > 0 ||
                copyPreview.operationSupplierCount > 0 || copyPreview.serviceSupplierCount > 0
            );

            return (
                <>
                    <div className="academic-year-bar">
                        <div className="academic-year-info">
                            <span className="academic-year-label">当前学年：</span>
                            <select
                                className="academic-year-select"
                                value={currentYear}
                                onChange={e => changeAcademicYear(e.target.value)}
                            >
                                {academicYears.map(y => (
                                    <option key={y} value={y}>{y}</option>
                                ))}
                            </select>
                        </div>
                        <button className="btn btn-small" onClick={openNewYearModal}>+ 新建学年</button>
                    </div>

                    {showNewYearModal && (
                        <div className="modal-overlay" onClick={() => setShowNewYearModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: '460px'}}>
                                <div className="modal-header">
                                    <h3>新建学年</h3>
                                    <button className="modal-close" onClick={() => setShowNewYearModal(false)}>×</button>
                                </div>
                                <div className="modal-body">
                                    <div className="form-group">
                                        <label>新学年名称</label>
                                        <input
                                            type="text"
                                            value={newYear}
                                            onChange={e => setNewYear(e.target.value)}
                                            placeholder="例如：2027-2028"
                                        />
                                        <p style={{fontSize: 11, color: '#999', marginTop: 4}}>
                                            格式：起始年份-结束年份，如 2027-2028
                                        </p>
                                    </div>
                                    <div className="form-group">
                                        <label>复制源学年数据</label>
                                        <select value={copyFromYear} onChange={e => setCopyFromYear(e.target.value)}>
                                            <option value="">不复制，创建空白学年</option>
                                            {academicYears.map(y => (
                                                <option key={y} value={y}>{y}</option>
                                            ))}
                                        </select>
                                    </div>
                                    {copyFromYear && (
                                        <div style={{
                                            background: hasCopyData ? '#f0f9ff' : '#fff7ed',
                                            border: '1px solid ' + (hasCopyData ? '#bae6fd' : '#fed7aa'),
                                            borderRadius: 6,
                                            padding: '10px 12px',
                                            marginTop: 8,
                                            fontSize: 13
                                        }}>
                                            {hasCopyData ? (
                                                <>
                                                    <p style={{margin: 0, color: '#0c4a6e', fontWeight: 500}}>
                                                        将从 "{copyFromYear}" 复制以下数据：
                                                    </p>
                                                    <ul style={{margin: '6px 0 0 16px', color: '#0c4a6e', lineHeight: 1.8}}>
                                                        <li>学校：{copyPreview.schoolCount || 0} 所</li>
                                                        <li>食堂：{copyPreview.canteenCount || 0} 个</li>
                                                        <li>食材供应商：{copyPreview.ingredientSupplierCount || 0} 个</li>
                                                        <li>校外供餐企业：{copyPreview.cateringCompanyCount || 0} 个</li>
                                                        <li>委托经营供应商：{copyPreview.operationSupplierCount || 0} 个</li>
                                                        <li>委托服务提供商：{copyPreview.serviceSupplierCount || 0} 个</li>

                                                </p>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="modal-footer">
                                    <button className="btn" onClick={() => setShowNewYearModal(false)}>取消</button>
                                    <button className="btn btn-primary" onClick={handleCreateYear} disabled={loading}>

        // ============ School List Page ============
        function SchoolsPage() {
            const { user } = useAuth();
            const { currentYear } = useAcademicYear();
            const [schools, setSchools] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [showBatchModal, setShowBatchModal] = useState(false);
            const [editData, setEditData] = useState(null);
            const [schoolMode, setSchoolMode] = useState('view');
            const [toast, setToast] = useState(null);
            const [search, setSearch] = useState('');

            const isSchoolUser = user?.role === 'school';

            // 学校用户默认加载本校数据到编辑弹窗
            useEffect(() => {
                if (isSchoolUser && schools.length > 0) {
                    setEditData(schools[0]);
                }
            }, [schools, isSchoolUser]);

            const loadData = () => {
                setLoading(true);
                const url = currentYear ? `/schools?academicYear=${currentYear}` : '/schools';
                apiFetch(url).then(data => {
                    if (data) { setSchools(data); setLoading(false); }
                });
            };

            useEffect(() => {
                loadData();
            }, [currentYear]);

            const handleExport = async () => {
                try {
                    const token = localStorage.getItem('token');
                    const res = await fetch('/api/schools/export', {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    if (!res.ok) throw new Error('导出失败');
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '学校信息导出_' + new Date().toISOString().split('T')[0] + '.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    alert('导出失败：' + err.message);
                }
            };

            useEffect(() => { loadData(); }, []);

            const filtered = schools.filter(s =>
                !search || s.name?.includes(search) || s.code?.includes(search) || s.region?.includes(search)
            );

            const handleSave = async (formData) => {
                try {
                    if (editData) {
                        await apiFetch(`/schools/${editData.id}`, { method: 'PUT', body: JSON.stringify(formData) });
                        setToast({ message: '修改成功', type: 'success' });
                    } else {
                        await apiFetch('/schools', { method: 'POST', body: JSON.stringify(formData) });
                        setToast({ message: '新增成功', type: 'success' });
                    }
                    setShowModal(false);
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('确认删除？')) return;
                try {
                    await apiFetch(`/schools/${id}`, { method: 'DELETE' });
                    setToast({ message: '删除成功', type: 'success' });
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <div className="page-title">学校信息管理</div>
                            <div className="page-breadcrumb">共 {schools.length} 所学校</div>
                        </div>
                        {!isSchoolUser && (
                            <div className="btn-group">
                                <button className="btn btn-secondary" onClick={handleExport}>导出</button>
                                <button className="btn btn-secondary" onClick={() => setShowBatchModal(true)}>批量导入</button>
                                <button className="btn btn-primary" onClick={() => { setEditData(null); setShowModal(true); }}>+ 新增学校</button>
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <div className="card-body">
                            <div className="filter-bar">
                                <input className="search-input" placeholder="搜索学校名称/代码/区域..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>学校名称</th>
                                            <th>学校代码</th>
                                            <th>学校类型</th>
                                            <th>供餐类型</th>
                                            <th>所在区域</th>
                                            <th>学生人数</th>
                                            <th>食堂数量</th>
                                            <th>营养改善计划</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 && (
                                            <tr><td colSpan="9" style={{textAlign:'center',color:'#999',padding:'40px'}}>暂无数据</td></tr>
                                        )}
                                        {filtered.map(s => (
                                            <tr key={s.id}>
                                                <td>{s.name}</td>
                                                <td>{s.code}</td>
                                                <td>{s.type}</td>
                                                <td>
                                                    {(s.供餐类型 || []).map(t => <span key={t} className="badge badge-blue" style={{marginRight:4}}>{t}</span>)}
                                                </td>
                                                <td>{s.region}</td>
                                                <td>{s.studentCount}</td>
                                                <td>{s.canteenCount}</td>
                                                <td><span className={`badge ${s.营养改善计划 === '是' ? 'badge-green' : 'badge-gray'}`}>{s.营养改善计划 || '否'}</span></td>
                                                <td>
                                                    <div className="btn-group">
                                                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(s); setShowModal(true); }}>查看</button>
                                                        {!isSchoolUser && <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(s); setShowModal(true); setSchoolMode('edit'); }}>编辑</button>}
                                                        {!isSchoolUser && <button className="btn btn-danger btn-sm" onClick={() => handleDelete(s.id)}>删除</button>}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {showModal && <SchoolModal data={editData} defaultMode={schoolMode} onSave={handleSave} onClose={() => setShowModal(false)} />}
                    {showBatchModal && <SchoolBatchImportModal onClose={() => setShowBatchModal(false)} onSuccess={() => { setShowBatchModal(false); loadData(); }} />}

        const schoolFields = [
            { key: 'name', label: '学校名称', type: 'text', required: true },
            { key: 'code', label: '学校代码', type: 'text', required: true },
            { key: 'type', label: '学校类型', type: 'select', options: ['小学','初中','高中','九年一贯制','十二年一贯制','其他'], required: true },
            { key: 'region', label: '所在区域', type: 'text', required: true },
            { key: 'address', label: '详细地址', type: 'text', required: true },
            { key: 'contact', label: '联系人', type: 'text', required: true },
            { key: 'phone', label: '联系电话', type: 'text', required: true },
            { key: 'studentCount', label: '学生人数', type: 'number', required: true },
            { key: 'staffCount', label: '教职工人数', type: 'number', required: true },
            { key: 'canteenCount', label: '食堂数量上限', type: 'text', note: '（0=不限制，仅管理员可设置）' },
            { key: '营养改善计划', label: '营养改善计划学校', type: 'select', options: ['是','否'], required: true },
            { key: 'department', label: '主管部门', type: 'text', required: true },
            { key: 'leader', label: '分管领导', type: 'text', required: true },
            { key: 'bankName', label: '膳食经费账户开户行', type: 'text', required: true },
            { key: 'bankAccount', label: '膳食经费账户', type: 'text', required: true },
            { key: '供餐类型', label: '供餐类型', type: 'mealType', required: true },
        ];

        function SchoolModal({ data, defaultMode, onSave, onClose }) {
            const [form, setForm] = useState(data ? { ...data } : {
                供餐类型: [], name: '', code: '', type: '', region: '', address: '', contact: '', phone: '',
                studentCount: '', staffCount: '', canteenCount: '', 营养改善计划: '否',
                department: '', leader: '', bankName: '', bankAccount: ''
            });
            const [mode, setMode] = useState(() => {
                if (!data) return 'edit';
                return defaultMode === 'edit' ? 'edit' : 'view';
            });
            const { user } = useAuth();
            const isSchoolUser = user?.role === 'school';
            const isView = mode === 'view';

            const handleMealTypeChange = (val) => {
                if (isView) return;
                let types = [...form.供餐类型];
                if (val === '无供餐') {
                    types = types.filter(t => t !== '校内供餐' && t !== '校外供餐');
                    if (!types.includes('无供餐')) types.push('无供餐');
                } else {
                    types = types.filter(t => t !== '无供餐');
                    if (types.includes(val)) types = types.filter(t => t !== val);
                    else types.push(val);
                }
                setForm({ ...form, 供餐类型: types });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);
            };

            // 渲染字段
            const renderField = (field) => {
                const val = form[field.key];
                const displayVal = (val !== undefined && val !== null && val !== '') ? String(val) : '—';

                if (isView) {
                    if (field.type === 'mealType') {
                        const types = form.供餐类型 || [];
                        return types.length > 0
                            ? types.map(t => <span key={t} className="badge badge-blue" style={{marginRight:4}}>{t}</span>)
                            : <span className="modal-field-view empty">未设置</span>;
                    }
                    if (field.type === 'readonly') {
                        return <div className="modal-field-view">{val || 0}{field.note || ''}</div>;
                    }
                    return <div className="modal-field-view">{displayVal}</div>;
                }

                // Edit mode
                if (field.type === 'mealType') {
                    return (
                        <div style={{display:'flex',gap:12,flexWrap:'wrap',padding:'6px 0'}}>
                            {['校内供餐','校外供餐','无供餐'].map(t => (
                                <label key={t} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:14}}>
                                    <input type="checkbox" checked={(form.供餐类型||[]).includes(t)} onChange={() => handleMealTypeChange(t)} />
                                    {t}
                                </label>
                            ))}
                        </div>
                    );
                }
                if (field.type === 'readonly') {
                    return <div className="modal-field-view">{val || 0}{field.note || ''}</div>;
                }
                // canteenCount only editable by admin
                if (field.key === 'canteenCount' && isSchoolUser) {
                    return <div className="modal-field-view">{val || 0}{field.note || ''}</div>;
                }
                if (field.type === 'select') {
                    return (
                        <select value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} disabled={isView}>
                            <option value="">请选择</option>
                            {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    );
                }
                return <input type={field.type} value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} disabled={isView} />;
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>
                                {data ? (isView ? `查看学校 - ${form.name}` : `编辑学校 - ${form.name}`) : '新增学校'}
                            </h3>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                {data && (
                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}
                                    </button>
                                )}
                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    {schoolFields.map(field => (
                                        <div key={field.key} className="form-group">
                                            <label>{field.label} {field.required && !isView && '*'}</label>
                                            {renderField(field)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!isView && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ School Batch Import Modal ============
        function SchoolBatchImportModal({ onClose, onSuccess }) {
            const [mode, setMode] = useState('excel');
            const [file, setFile] = useState(null);
            const [jsonText, setJsonText] = useState('');
            const [error, setError] = useState('');
            const [uploading, setUploading] = useState(false);

            const handleFileChange = (e) => {
                const f = e.target.files[0];
                if (f) {
                    const ext = f.name.split('.').pop().toLowerCase();
                    if (!['xlsx', 'xls'].includes(ext)) {
                        setError('仅支持 .xlsx 或 .xls 文件');
                        setFile(null);
                    } else {
                        setError('');
                        setFile(f);
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setUploading(true);
                try {
                    if (mode === 'excel') {
                        if (!file) { setError('请选择 Excel 文件'); setUploading(false); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        const token = localStorage.getItem('token');
                        const res = await fetch('/api/schools/batch-import-file', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                            body: formData
                        });
                        const result = await res.json();
                        if (!res.ok) throw new Error(result.error || '导入失败');
                        alert(`导入成功：${result.success} 所学校`);
                        onSuccess && onSuccess();
                    } else {
                        const data = JSON.parse(jsonText);
                        if (!Array.isArray(data)) throw new Error('数据必须是数组格式');
                        const token = localStorage.getItem('token');
                        const res = await fetch('/api/schools/batch-import', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                            body: JSON.stringify({ schools: data })
                        });
                        const result = await res.json();
                        if (!res.ok) throw new Error(result.error || '导入失败');
                        alert(`导入成功：${result.success} 所学校`);
                        onSuccess && onSuccess();
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: '560px'}}>
                        <div className="modal-header">
                            <h3>批量导入学校</h3>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="role-tabs" style={{marginBottom: 16}}>
                                    <button type="button" className={`role-tab ${mode === 'excel' ? 'active' : ''}`} onClick={() => setMode('excel')}>Excel 文件</button>
                                    <button type="button" className={`role-tab ${mode === 'json' ? 'active' : ''}`} onClick={() => setMode('json')}>JSON 文本</button>
                                </div>
                                {mode === 'excel' ? (
                                    <div>
                                        <p style={{fontSize: 13, color: '#888', marginBottom: 12}}>请上传 Excel 文件（.xlsx 或 .xls）</p>
                                        <div className="form-group">
                                            <label>选择 Excel 文件</label>
                                            <input type="file" accept=".xlsx,.xls" onChange={handleFileChange} style={{padding: '8px'}} />
                                        </div>
                                        {file && <p style={{fontSize: 12, color: '#27ae60', marginTop: 4}}>已选择：{file.name}</p>}
                                        <p style={{fontSize: 12, color: '#888', marginTop: 12}}>
                                            <strong>Excel 表格列说明（*为必填）：</strong><br/>
                                            学校代码*、学校名称*、学校类型*、供餐类型*（校内供餐/校外供餐/无供餐）、<br/>
                                            所在区域*、详细地址*、联系人*、联系电话*、学生人数*、教职工人数*、食堂数量*、<br/>
                                            是否为营养改善计划学校*（是/否）、主管部门*、分管领导*、<br/>
                                            膳食经费账户开户行*、膳食经费账户*<br/>
                                            <a href="/school_import_template.xlsx" download style={{color:'#667eea'}}>下载 Excel 模板</a>
                                        </p>
                                    </div>
                                ) : (
                                    <div>
                                        <p style={{fontSize: 13, color: '#888', marginBottom: 12}}>请输入 JSON 格式的学校数组</p>
                                        <div className="form-group">
                                            <textarea
                                                value={jsonText}
                                                onChange={e => setJsonText(e.target.value)}
                                                rows={10}
                                                placeholder='[{"学校代码":"","学校名称":"","学校类型":"","供餐类型":"","所在区域":"","详细地址":"","联系人":"","联系电话":"","学生人数":0,"教职工人数":0,"食堂数量":0,"是否为营养改善计划学校":"","主管部门":"","分管领导":"","膳食经费账户开户行":"","膳食经费账户":""}, ...]'
                                                style={{width: '100%', padding: '8px', fontFamily: 'monospace', fontSize: 12}}
                                            />
                                        </div>
                                    </div>
                                )}
                                {error && <p style={{color: '#e74c3c', fontSize: 13, marginTop: 8}}>{error}</p>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn" onClick={onClose}>取消</button>
                                <button type="submit" className="btn btn-primary" disabled={uploading}>{uploading ? '导入中...' : '导入'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ Canteens Page ============
        function CanteensPage() {
            const [canteens, setCanteens] = useState([]);
            const [schools, setSchools] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editData, setEditData] = useState(null);
            const [canteenMode, setCanteenMode] = useState('view');
            const [toast, setToast] = useState(null);
            const [search, setSearch] = useState('');
            const { user } = useAuth();
            const { currentYear } = useAcademicYear();

            const loadData = () => {
                const canteenUrl = currentYear ? `/canteens?academicYear=${currentYear}` : '/canteens';
                Promise.all([
                    apiFetch(canteenUrl),
                    apiFetch('/schools')
                ]).then(([c, s]) => {
                    if (c && s) { setCanteens(c); setSchools(s); setLoading(false); }
                });
            };

            useEffect(() => { loadData(); }, [currentYear]);

            const filtered = canteens.filter(c =>
                !search || c.name?.includes(search) || c.code?.includes(search)
            );

            const getSchoolName = (schoolId) => schools.find(s => s.id === schoolId)?.name || schoolId;

            const handleSave = async (formData) => {
                try {
                    if (editData) {
                        await apiFetch(`/canteens/${editData.id}`, { method: 'PUT', body: JSON.stringify(formData) });
                    } else {
                        await apiFetch('/canteens', { method: 'POST', body: JSON.stringify(formData) });
                    }
                    setToast({ message: '保存成功', type: 'success' });
                    setShowModal(false);
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('确认删除？')) return;
                await apiFetch(`/canteens/${id}`, { method: 'DELETE' });
                setToast({ message: '删除成功', type: 'success' });
                loadData();
            };

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <div className="page-title">食堂信息管理</div>
                            <div className="page-breadcrumb">共 {canteens.length} 个食堂</div>
                        </div>
                        {(user?.role === 'admin' || user?.role === 'school') && <button className="btn btn-primary" onClick={() => { setEditData(null); setShowModal(true); }}>+ 新增食堂</button>}
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <div className="filter-bar">
                                <input className="search-input" placeholder="搜索食堂名称/编码..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>食堂名称</th>
                                            <th>所属学校</th>
                                            <th>负责人</th>
                                            <th>联系电话</th>
                                            <th>经营模式</th>
                                            <th>营养改善计划食堂</th>
                                            <th>食品安全员</th>
                                            <th>运营状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 && (
                                            <tr><td colSpan="9" style={{textAlign:'center',color:'#999',padding:'40px'}}>暂无数据</td></tr>
                                        )}
                                        {filtered.map(c => (
                                            <tr key={c.id}>
                                                <td>{c.name}</td>
                                                <td>{getSchoolName(c.schoolId)}</td>
                                                <td>{c.manager}</td>
                                                <td>{c.phone}</td>
                                                <td><span className={`badge ${c.operationMode === '自营' ? 'badge-green' : 'badge-blue'}`}>{c.operationMode}</span></td>
                                                <td><span className={`badge ${c.营养改善计划食堂 === '是' ? 'badge-green' : 'badge-gray'}`}>{c.营养改善计划食堂 || '否'}</span></td>
                                                <td>{c.foodSafetyStaff}</td>
                                                <td><span className={`badge ${c.status === '正常运营' ? 'badge-green' : c.status === '停用' ? 'badge-red' : 'badge-yellow'}`}>{c.status}</span></td>
                                                <td>
                                                    <div className="btn-group">
                                                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(c); setShowModal(true); }}>查看</button>
                                                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(c); setShowModal(true); setCanteenMode('edit'); }}>编辑</button>
                                                        <button className="btn btn-danger btn-sm" onClick={() => handleDelete(c.id)}>删除</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    {showModal && <CanteenModal data={editData} defaultMode={canteenMode} schools={schools} user={user} onSave={handleSave} onClose={() => setShowModal(false)} />}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function CanteenModal({ data, defaultMode, schools, user, onSave, onClose }) {
            const isAdmin = user?.role === 'admin';
            const [form, setForm] = useState(data ? { ...data } : {
                name: '', code: '', schoolId: isAdmin ? '' : user.schoolId || schools[0]?.id,
                address: '', manager: '', phone: '', financeStaff: '', financePhone: '',
                area: '', capacity: '', staffCount: '', operationMode: '自营',
                营养改善计划食堂: '否', foodSafetyStaff: '', foodSafetyPhone: '',

                if (!data) return 'edit';

                { key: 'manager', label: '负责人', type: 'text', required: true },
                { key: 'phone', label: '联系电话', type: 'text', required: true },
                { key: 'financeStaff', label: '食堂财务人员', type: 'text', required: true },
                { key: 'financePhone', label: '财务人员联系方式', type: 'text', required: true },
                { key: 'area', label: '食堂面积（㎡）', type: 'number', required: true },
                { key: 'capacity', label: '就餐容量（人）', type: 'number', required: true },
                { key: 'staffCount', label: '从业人员数', type: 'number', required: true },

            const getDisplayValue = (val) => (val !== undefined && val !== null && val !== '') ? String(val) : '—';

            const renderField = (field) => {
                if (isView) {
                    if (field.type === 'select') {
                        const opts = field.options.map(o => typeof o === 'object' ? o.label : o);
                        const vals = field.options.map(o => typeof o === 'object' ? o.value : o);
                        const idx = vals.indexOf(form[field.key]);
                        return <div className="modal-field-view">{idx >= 0 ? opts[idx] : '—'}</div>;
                    }
                    return <div className="modal-field-view">{getDisplayValue(form[field.key])}</div>;
                }
                if (field.type === 'select') {
                    return (
                        <select value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} disabled={field.key === 'schoolId' && !isAdmin}>
                            <option value="">请选择</option>
                            {field.options.map(o => <option key={typeof o === 'object' ? o.value : o} value={typeof o === 'object' ? o.value : o}>{typeof o === 'object' ? o.label : o}</option>)}
                        </select>
                    );
                }
                return <input type={field.type} value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} />;

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);

            // 获取学校名称
            const getSchoolName = (id) => schools.find(s => s.id === id)?.name || id;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? (isView ? `查看食堂 - ${form.name}` : `编辑食堂 - ${form.name}`) : '新增食堂'}</h3>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                {data && (
                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}
                                    </button>
                                )}
                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    {canteenFields.map(field => (
                                        <div key={field.key} className="form-group">
                                            <label>{field.label} {field.required && !isView && '*'}</label>

                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!isView && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );

        // ============ Supplier Form Modal ============
        function SupplierModal({ type, data, defaultMode, onSave, onClose }) {
            const [form, setForm] = useState(data ? { ...data } : getDefaultForm(type));
            const [mode, setMode] = useState(() => {
                if (!data) return 'edit';
                return defaultMode === 'edit' ? 'edit' : 'view';
            });
            const isView = mode === 'view';

            function getDefaultForm(t) {
                const base = { name: '', code: '', companyType: '有限责任公司', region: '', address: '', legalPerson: '', phone: '', capital: '', establishDate: '', businessScope: '' };
                if (t === 'ingredient') return { ...base, mainProducts: '' };
                if (t === 'catering') return { ...base, dailyCapacity: '', currentSupply: 0, 应急备选企业: '否' };
                if (t === 'operation') return { ...base, operatedCanteens: '' };
                return base;
            }

            const fields = [
                { key: 'name', label: '企业名称', type: 'text', required: true },
                { key: 'code', label: '统一社会信用代码', type: 'text', required: true },
                { key: 'companyType', label: '企业类型', type: 'select', options: ['有限责任公司','股份有限公司','国有企业','其他'], required: true },
                { key: 'region', label: '所在区域', type: 'text', required: true },
                { key: 'address', label: '详细地址', type: 'text', required: true },
                { key: 'legalPerson', label: '法定代表人', type: 'text', required: true },
                { key: 'phone', label: '联系电话', type: 'text', required: true },
                { key: 'capital', label: '注册资本（万元）', type: 'number', required: true },
                { key: 'establishDate', label: '成立日期', type: 'date', required: true },
                { key: 'businessScope', label: '经营范围', type: 'textarea', required: true },
                ...(type === 'ingredient' ? [{ key: 'mainProducts', label: '主营产品类别', type: 'text', required: false }] : []),
                ...(type === 'catering' ? [
                    { key: 'dailyCapacity', label: '日均供餐能力（份）', type: 'number', required: true },
                    { key: '应急备选企业', label: '应急备选企业', type: 'select', options: ['是','否'], required: true },
                ] : []),
                ...(type === 'operation' ? [{ key: 'operatedCanteens', label: '食堂委托经营项目数', type: 'number', required: false }] : []),
            ];

            const getDisplayValue = (val) => (val !== undefined && val !== null && val !== '') ? String(val) : '—';

            const renderField = (field) => {
                if (isView) {
                    if (field.type === 'select') {
                        const idx = field.options.indexOf(form[field.key]);
                        return <div className="modal-field-view">{idx >= 0 ? field.options[idx] : '—'}</div>;
                    }
                    if (field.type === 'textarea') {
                        return <div className="modal-field-view" style={{whiteSpace:'pre-wrap'}}>{getDisplayValue(form[field.key])}</div>;
                    }
                    return <div className="modal-field-view">{getDisplayValue(form[field.key])}</div>;
                }
                if (field.type === 'select') {
                    return (
                        <select value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required}>
                            <option value="">请选择</option>
                            {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    );
                }
                if (field.type === 'textarea') {
                    return <textarea value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} rows={3} style={{width:'100%',padding:'10px',border:'2px solid #e8ecf0',borderRadius:'8px',fontSize:'14px',fontFamily:'inherit',resize:'vertical'}} />;
                }
                return <input type={field.type} value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} />;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? (isView ? `查看企业信息 - ${form.name}` : `编辑企业信息 - ${form.name}`) : '新增企业信息'}</h3>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                {data && (
                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}
                                    </button>
                                )}
                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    {fields.map(field => (
                                        <div key={field.key} className="form-group">
                                            <label>{field.label} {field.required && !isView && '*'}</label>
                                            {renderField(field)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!isView && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

                if (daysLeft <= 30) return 'yellow';
                return 'green';
            };
