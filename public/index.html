                    const end = new Date(endDate);
                    const startStr = `${start.getFullYear()}年${String(start.getMonth() + 1).padStart(2, '0')}月`;
                    const endStr = `${end.getFullYear()}年${String(end.getMonth() + 1).padStart(2, '0')}月`;
                    return `${startStr}至${endStr}${typeName}`;
                }
                return typeName;
            };

            const [form, setForm] = useState(() => {
                if (data) {
                    // Editing existing contract - map stored data to form fields
                    const supplierType = ownerTypeToSupplierType(data.ownerType);
                    return {
                        schoolId: data.relatedSchoolId || '',
                        canteenId: data.relatedCanteenName === '校外供餐' ? '校外供餐' : (data.relatedCanteenId || ''),
                        supplierType: supplierType,
                        supplierId: data.ownerId || '',
                        contractNo: data.contractNo || '',
                        contractName: data.contractName || '',
                        contractType: data.contractType || '食材供应合同',
                        signDate: data.signDate || '',
                        startDate: data.startDate || '',
                        endDate: data.endDate || '',
                        amount: data.amount || '',
                        paymentTerms: data.paymentTerms || '按月支付',
                        remarks: data.remarks || '',
                    };
                }
                // New contract - for school users, pre-fill schoolId
                return {
                    schoolId: user?.role === 'school' ? user.schoolId : '',
                    canteenId: '', contractType: '', supplierType: '', supplierId: '',
                    contractNo: '', contractName: '',
                    signDate: '', startDate: '', endDate: '', amount: '', paymentTerms: '按月支付', remarks: ''
                };
            });

            // Auto-calculate status based on dates
            const getAutoStatus = (start, end) => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                if (start) {
                    const startDate = new Date(start);
                    if (startDate > today) return '未生效';
                }
                if (end) {
                    const endDate = new Date(end);
                    if (endDate < today) return '终止';
                }
                return '有效';
            };

            const autoStatus = getAutoStatus(form.startDate, form.endDate);

            useEffect(() => {
                Promise.all([
                    apiFetch('/schools'),
                    apiFetch('/canteens'),
                    apiFetch('/ingredient-suppliers'),
                    apiFetch('/catering-companies'),
                    apiFetch('/operation-suppliers'),
                ]).then(([s, c, ing, cat, op]) => {
                    setSchools(s || []);
                    setCanteens(c || []);
                    setSuppliers({ ingredient: ing || [], catering: cat || [], operation: op || [] });
                });
            }, []);

            // Determine supplier type based on canteen or school
            const getSupplierType = () => {
                if (form.canteenId === '校外供餐') return 'cateringCompany';
                if (form.canteenId) {
                    const canteen = canteens.find(c => c.id === form.canteenId);
                    if (canteen) {
                        if (canteen.operationMode === '自营') return 'ingredientSupplier';
                        if (canteen.operationMode === '委托经营') return 'operationSupplier';
                    }
                }
                // Check school if no canteen selected
                if (form.schoolId) {
                    const school = schools.find(s => s.id === form.schoolId);
                    if (school?.供餐类型?.includes('校外供餐')) return 'cateringCompany';
                }
                return '';
            };

            // Auto-update supplier type and contract name when canteen changes
            useEffect(() => {
                if (!data) {
                    const st = getSupplierType();
                    const newName = generateContractName(st, form.startDate, form.endDate);
                    setForm(f => ({ ...f, supplierType: st, supplierId: '', contractName: newName }));
                }
            }, [form.schoolId, form.canteenId]);

            // Auto-update contract name when supplierType or dates change
            useEffect(() => {
                if (!data) {
                    const newName = generateContractName(form.supplierType, form.startDate, form.endDate);
                    setForm(f => ({ ...f, contractName: newName }));
                }
            }, [form.supplierType, form.startDate, form.endDate]);

            const supplierTypeName = {
                ingredientSupplier: '食材供应商',
                cateringCompany: '校外供餐企业',
                operationSupplier: '委托经营供应商'
            };

            const currentSuppliers = form.supplierType === 'ingredientSupplier' ? suppliers.ingredient
                : form.supplierType === 'cateringCompany' ? suppliers.catering
                : form.supplierType === 'operationSupplier' ? suppliers.operation : [];

            const handleSubmit = (e) => {
                e.preventDefault();
                const school = schools.find(s => s.id === form.schoolId);
                const canteen = canteens.find(c => c.id === form.canteenId);
                const supplier = currentSuppliers.find(s => s.id === form.supplierId);
                const calculatedStatus = getAutoStatus(form.startDate, form.endDate);

                const saveData = {
                    ...form,
                    relatedSchoolId: form.schoolId,
                    relatedSchoolName: school?.name || '',
                    relatedCanteenId: form.canteenId === '校外供餐' ? '' : (form.canteenId || ''),
                    relatedCanteenName: form.canteenId === '校外供餐' ? '校外供餐' : (canteen?.name || ''),
                    ownerId: supplier?.id || '',
                    ownerName: supplier?.name || '',
                    ownerType: supplierTypeName[form.supplierType] || '',
                    status: calculatedStatus,
                };
                onSave(saveData);
            };

            const school = schools.find(s => s.id === form.schoolId);
            // 校内供餐：显示食堂选择；校外供餐：显示校外供餐选项
            const hasInsideCatering = school?.供餐类型?.includes('校内供餐');
            const hasOutsideCatering = school?.供餐类型?.includes('校外供餐');
            const schoolCanteens = canteens.filter(c => c.schoolId === form.schoolId);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? '查看合同' : '新增合同'}</h3>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>学校 {user?.role === 'school' && !data ? '' : '*'}</label>
                                        {user?.role === 'school' && !data ? (
                                            <div className="modal-field-view">{schools.find(s => s.id === form.schoolId)?.name || '本校'}</div>
                                        ) : (
                                            <select value={form.schoolId} onChange={e => setForm({...form, schoolId: e.target.value, canteenId: '', supplierType: '', supplierId: ''})} required disabled={!!data}>
                                                <option value="">请选择学校</option>
                                                {schools.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        )}
                                    </div>
                                    <div className="form-group">
                                        <label>食堂/供餐类型</label>
                                        <select value={form.canteenId} onChange={e => setForm({...form, canteenId: e.target.value, supplierId: ''})} disabled={!!data}>
                                            <option value="">请选择</option>
                                            {hasInsideCatering && schoolCanteens.filter(c => c.operationMode === '自营').map(c => (
                                                <option key={c.id} value={c.id}>{c.name}（自营）</option>
                                            ))}
                                            {hasInsideCatering && schoolCanteens.filter(c => c.operationMode === '委托经营').map(c => (
                                                <option key={c.id} value={c.id}>{c.name}（委托经营）</option>
                                            ))}
                                            {hasOutsideCatering && <option value="校外供餐">校外供餐</option>}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>供应商类型</label>
                                        <select value={form.supplierType} disabled style={{backgroundColor:'#f0f0f0'}}>
                                            <option value="">请先选择学校和食堂</option>
                                            {form.supplierType === 'ingredientSupplier' && <option value="ingredientSupplier">食材供应商</option>}
                                            {form.supplierType === 'cateringCompany' && <option value="cateringCompany">校外供餐企业</option>}
                                            {form.supplierType === 'operationSupplier' && <option value="operationSupplier">委托经营供应商</option>}
                                        </select>
                                        {!data && <small style={{color:'#666'}}>
                                            {form.supplierType === 'ingredientSupplier' ? '（根据自营食堂自动匹配）' :
                                             form.supplierType === 'operationSupplier' ? '（根据委托经营食堂自动匹配）' :
                                             form.supplierType === 'cateringCompany' ? '（根据校外供餐学校自动匹配）' : ''}
                                        </small>}
                                    </div>
                                    <div className="form-group">
                                        <label>供应商 *</label>
                                        <select value={form.supplierId} onChange={e => setForm({...form, supplierId: e.target.value})} required disabled={!!data || !form.supplierType}>
                                            <option value="">请选择供应商</option>
                                            {currentSuppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>合同编号 *</label>
                                        <input type="text" value={form.contractNo} onChange={e => setForm({...form, contractNo: e.target.value})} required disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同名称 *</label>
                                        <input type="text" value={form.contractName} onChange={e => setForm({...form, contractName: e.target.value})} required disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>签约日期</label>
                                        <input type="date" value={form.signDate} onChange={e => setForm({...form, signDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同开始日期</label>
                                        <input type="date" value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同结束日期</label>
                                        <input type="date" value={form.endDate} onChange={e => setForm({...form, endDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同金额(元)</label>
                                        <input type="number" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>付款方式</label>
                                        <select value={form.paymentTerms} onChange={e => setForm({...form, paymentTerms: e.target.value})} disabled={!!data}>
                                            <option value="按月支付">按月支付</option>
                                            <option value="按学期支付">按学期支付</option>
                                            <option value="按年支付">按年支付</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>状态</label>
                                        <div className="modal-field-view" style={{padding:'8px 0'}}>
                                            <span className={`badge ${autoStatus === '有效' ? 'badge-green' : autoStatus === '未生效' ? 'badge-yellow' : 'badge-red'}`}>{autoStatus}</span>
                                            {data && <small style={{marginLeft:8,color:'#999'}}>（根据日期自动判断）</small>}
                                        </div>
                                    </div>
                                    <div className="form-group" style={{flexBasis:'100%'}}>
                                        <label>备注</label>
                                        <textarea value={form.remarks} onChange={e => setForm({...form, remarks: e.target.value})} rows={2} style={{width:'100%',padding:'10px',border:'2px solid #e8ecf0',borderRadius:'8px',fontSize:'14px'}} disabled={!!data} />
                                    </div>
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!data && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ Selections Page (for school users) ============
        function SelectionsPage() {
            const [announcements, setAnnouncements] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editData, setEditData] = useState(null);
            const [toast, setToast] = useState(null);
            const [statusFilter, setStatusFilter] = useState('');
            const [search, setSearch] = useState('');
            const [activeTab, setActiveTab] = useState('announcements');
            const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
            const [currentStep, setCurrentStep] = useState(1);
            // 流程数据
            const [registrations, setRegistrations] = useState([]);
            const [inspectionForm, setInspectionForm] = useState(null);
            const [shortlistForm, setShortlistForm] = useState(null);
            const [resultForm, setResultForm] = useState(null);
            const [contractForm, setContractForm] = useState(null);
            const { user } = useAuth();

            const loadData = () => {
                setLoading(true);
                apiFetch('/selection/announcements').then(d => { if (d) { setAnnouncements(d); setLoading(false); } });
            };

            useEffect(() => { loadData(); }, []);

            const handleCreate = () => { setEditData(null); setShowModal(true); };
            const handleEdit = (item) => { setEditData(item); setShowModal(true); };

            const handleDelete = async (id) => {
                if (!confirm('确定删除此公告？')) return;
                const d = await apiFetch(`/selection/announcements/${id}`, { method: 'DELETE' });
                if (d) { setToast('删除成功'); loadData(); }
            };

            const handlePublish = async (id) => {
                const d = await apiFetch(`/selection/announcements/${id}/publish`, { method: 'POST' });
                if (d) { setToast('发布成功'); loadData(); }
            };

            const handleClose = async (id) => {
                const d = await apiFetch(`/selection/announcements/${id}/close`, { method: 'POST' });
                if (d) { setToast('已结束'); loadData(); }
            };

            const handleManageWorkflow = (announcement) => {
                setSelectedAnnouncement(announcement);
                // 加载现有数据
                Promise.all([
                    apiFetch(`/selection/announcements/${announcement.id}/registrations`),
                    apiFetch('/selection/candidates'),
                    apiFetch('/selection/inspections'),
                    apiFetch('/selection/shortlisted'),
                    apiFetch('/selection/results')
                ]).then(([regs, cands, insps, shorts, res]) => {
                    setRegistrations(regs || []);
                    // 确定当前步骤
                    if (res && res.length > 0 && res.find(r => r.announcementId === announcement.id)) {
                        setCurrentStep(6);
                    } else if (shorts && shorts.length > 0 && shorts.find(s => s.announcementId === announcement.id)) {
                        setCurrentStep(5);
                    } else if (insps && insps.length > 0 && insps.find(i => i.announcementId === announcement.id)) {
                        setCurrentStep(4);
                    } else if (cands && cands.length > 0 && cands.find(c => c.announcementId === announcement.id)) {
                        setCurrentStep(3);
                    } else if (announcement.status === '遴选中') {
                        setCurrentStep(2);
                    } else {
                        setCurrentStep(1);
                    }
                });
                setActiveTab('workflow');
            };

            // 步骤2: 添加报名企业
            const [showAddRegModal, setShowAddRegModal] = useState(false);
            const [newReg, setNewReg] = useState({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
            const [enterpriseList, setEnterpriseList] = useState([]);

            const openAddRegModal = async () => {
                try {
                    // 根据服务类型获取企业列表
                    const serviceType = selectedAnnouncement?.serviceType;
                    let url = '';
                    if (serviceType === '食材供应') {
                        url = '/ingredient-suppliers';
                    } else if (serviceType === '校外供餐') {
                        url = '/catering-companies';
                    } else {
                        url = '/catering-companies';
                    }
                    const enterprises = await apiFetch(url);
                    console.log('enterprises:', enterprises);
                    if (enterprises) {
                        setEnterpriseList(enterprises);
                    }
                    setNewReg({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
                    setShowAddRegModal(true);
                } catch (err) {
                    console.error('openAddRegModal error:', err);
                    alert('获取企业列表失败：' + err.message);
                }
            };

            const handleAddRegistration = async () => {
                if (!newReg.enterpriseId) { alert('请选择企业'); return; }
                const selected = enterpriseList.find(e => e.id === newReg.enterpriseId);
                const d = await apiFetch('/selection/registrations', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseId: newReg.enterpriseId,
                        enterpriseName: selected?.name || newReg.enterpriseName,
                        contactPerson: newReg.contactPerson,
                        contactPhone: newReg.contactPhone,
                        status: '已受理' // 直接标记为已受理
                    })
                });
                if (d) {
                    setToast('已添加报名企业');
                    setShowAddRegModal(false);
                    setNewReg({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
                    handleManageWorkflow(selectedAnnouncement);
                }
            };

            // 步骤3: 确认备选企业
            const handleConfirmCandidates = async () => {
                if (registrations.length < 2) { alert('备选企业至少需要2家'); return; }
                const d = await apiFetch('/selection/candidates', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseIds: registrations.map(r => r.enterpriseId)
                    })
                });
                if (d) { setToast('备选企业已确认'); setCurrentStep(3); }
            };

            // 步骤4: 考察记录
            const [showInspModal, setShowInspModal] = useState(false);
            const [inspData, setInspData] = useState({ enterpriseId: '', enterpriseName: '', inspectionTime: '', inspectionLocation: '', inspectors: '', inspectionResult: '', passed: null });

            const openInspectionModal = (reg) => {
                setInspData({ enterpriseId: reg.enterpriseId, enterpriseName: reg.enterpriseName, inspectionTime: new Date().toISOString().split('T')[0], inspectionLocation: '', inspectors: '', inspectionResult: '', passed: null });
                setShowInspModal(true);
            };

            const handleSaveInspection = async () => {
                const method = inspectionForm ? 'PUT' : 'POST';
                const url = inspectionForm ? `/selection/inspections/${inspectionForm.id}` : '/selection/inspections';
                const payload = { ...inspData, announcementId: selectedAnnouncement.id };
                if (inspectionForm) { delete payload.enterpriseId; delete payload.enterpriseName; }
                const d = await apiFetch(url, { method, body: JSON.stringify(payload) });
                if (d) {
                    setToast('考察记录已保存');
                    setShowInspModal(false);
                    setInspectionForm(null);
                    handleManageWorkflow(selectedAnnouncement);
                }
            };

            const handleInspectionPass = async (inspId) => {
                const d = await apiFetch(`/selection/inspections/${inspId}/pass`, { method: 'POST', body: JSON.stringify({ comments: '考察通过' }) });
                if (d) { setToast('考察已通过'); handleManageWorkflow(selectedAnnouncement); }
            };

            const handleInspectionFail = async (inspId) => {
                const d = await apiFetch(`/selection/inspections/${inspId}/fail`, { method: 'POST', body: JSON.stringify({ comments: '考察不通过' }) });
                if (d) { setToast('考察未通过'); handleManageWorkflow(selectedAnnouncement); }
            };

            // 步骤5: 确定入围
            const [showShortlistModal, setShowShortlistModal] = useState(false);
            const [shortlistData, setShortlistData] = useState({ enterpriseIds: [], determinationTime: new Date().toISOString().split('T')[0] });

            const openShortlistModal = () => {
                const passedRegs = registrations.filter(r => r.enterpriseId); // 简化：取所有已受理的
                setShortlistData({ enterpriseIds: passedRegs.map(r => r.enterpriseId), determinationTime: new Date().toISOString().split('T')[0] });
                setShowShortlistModal(true);
            };

            const handleConfirmShortlisted = async () => {
                if (shortlistData.enterpriseIds.length < 1) { alert('请选择入围企业'); return; }
                const d = await apiFetch('/selection/shortlisted', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseIds: shortlistData.enterpriseIds
                    })
                });
                if (d) { setToast('入围企业已确定'); setShowShortlistModal(false); setCurrentStep(5); }
            };

            // 步骤6: 确定中标
            const [showResultModal, setShowResultModal] = useState(false);
            const [resultData, setResultData] = useState({ winningEnterpriseId: '', winningEnterpriseName: '', determinationMethod: '抽签', determinationBy: '家长代表', parentRepresentatives: '' });

            const openResultModal = () => {
                if (registrations.length > 0) {
                    setResultData({ ...resultData, winningEnterpriseId: registrations[0].enterpriseId, winningEnterpriseName: registrations[0].enterpriseName });
                }
                setShowResultModal(true);
            };

            const handleConfirmResult = async () => {
                if (!resultData.winningEnterpriseName) { alert('请选择中标企业'); return; }
                const d = await apiFetch('/selection/results', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        winningEnterprise: { enterpriseId: resultData.winningEnterpriseId, enterpriseName: resultData.winningEnterpriseName },
                        determinationMethod: resultData.determinationMethod,
                        determinationBy: resultData.determinationBy,
                        parentRepresentatives: resultData.parentRepresentatives.split(',').map(s => s.trim())
                    })
                });
                if (d) { setToast('中标结果已确定'); setShowResultModal(false); setCurrentStep(6); }
            };

            // 步骤7: 签订合同
            const [showContractModal, setShowContractModal] = useState(false);
            const [contractData, setContractData] = useState({ contractStartDate: '', contractEndDate: '', contractAmount: '', paymentTerms: '季度结算', remarks: '' });

            const openContractModal = () => {
                setContractData({ contractStartDate: new Date().toISOString().split('T')[0], contractEndDate: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], contractAmount: '', paymentTerms: '季度结算', remarks: '' });
                setShowContractModal(true);
            };

            const handleSignContract = async () => {
                const d = await apiFetch('/selection/contracts', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseId: resultData.winningEnterpriseId,
                        enterpriseName: resultData.winningEnterpriseName,
                        ...contractData
                    })
                });
                if (d) { setToast('遴选合同已创建'); setShowContractModal(false); setCurrentStep(7); }
            };

            const filtered = announcements.filter(a => {
                if (statusFilter && a.status !== statusFilter) return false;
                if (search && !a.title?.includes(search)) return false;
                return true;
            });

            return (
                <div className="page-container">
                    {toast && <div className="toast" onClick={() => setToast(null)}>{toast}</div>}
                    <div className="page-header">
                        <div><h2>公开遴选</h2></div>
                        <button className="btn-primary" onClick={handleCreate}>+ 新建公告</button>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'announcements' ? 'active' : ''}`} onClick={() => setActiveTab('announcements')}>公告管理 ({filtered.length})</button>
                    </div>

                    {activeTab === 'announcements' ? (
                        <>
                            <div className="filter-bar">
                                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                                    <option value="">全部状态</option>
                                    <option value="草稿">草稿</option>
                                    <option value="已发布">已发布</option>
                                    <option value="遴选中">遴选中</option>
                                    <option value="已结束">已结束</option>
                                </select>
                                <input type="text" placeholder="搜索公告标题..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            {loading ? <div className="loading">加载中...</div> : (
                                <table className="data-table">

                                <h4>① 发布公告</h4>

                                    <h4>⑤ 确定入围企业</h4>

                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowShortlistModal(false)}>取消</button><button type="submit" className="btn-primary">确认入围</button></div>
                                </form>
                            </div>

                    )}

                    {/* 中标结果弹窗 */}
                    {showResultModal && (
                        <div className="modal-overlay" onClick={() => setShowResultModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>确定中标结果</h3><button className="close" onClick={() => setShowResultModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleConfirmResult(); }}>
                                    <div className="form-group"><label>中标企业 <span className="required">*</span></label><select value={resultData.winningEnterpriseId} onChange={e => { const r = registrations.find(reg => reg.enterpriseId === e.target.value); setResultData({...resultData, winningEnterpriseId: e.target.value, winningEnterpriseName: r?.enterpriseName || ''}); }}><option value="">请选择</option>{registrations.map(r => <option key={r.id} value={r.enterpriseId}>{r.enterpriseName}</option>)}</select></div>
                                    <div className="form-group"><label>确定方式</label><select value={resultData.determinationMethod} onChange={e => setResultData({...resultData, determinationMethod: e.target.value})}><option value="抽签">抽签</option><option value="投票">投票</option><option value="其他">其他</option></select></div>

                                    <div className="form-group"><label>家长代表</label><input type="text" value={resultData.parentRepresentatives} onChange={e => setResultData({...resultData, parentRepresentatives: e.target.value})} placeholder="多个用逗号分隔" /></div>

                                    <div className="form-row"><div className="form-group"><label>合同开始日期</label><input type="date" value={contractData.contractStartDate} onChange={e => setContractData({...contractData, contractStartDate: e.target.value})} /></div><div className="form-group"><label>合同结束日期</label><input type="date" value={contractData.contractEndDate} onChange={e => setContractData({...contractData, contractEndDate: e.target.value})} /></div></div>
                                    <div className="form-row"><div className="form-group"><label>合同金额(万元)</label><input type="number" value={contractData.contractAmount} onChange={e => setContractData({...contractData, contractAmount: e.target.value})} placeholder="0" /></div><div className="form-group"><label>付款方式</label><select value={contractData.paymentTerms} onChange={e => setContractData({...contractData, paymentTerms: e.target.value})}><option value="季度结算">季度结算</option><option value="月结">月结</option><option value="半年结">半年结</option><option value="年结">年结</option></select></div></div>

                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowContractModal(false)}>取消</button><button type="submit" className="btn-primary">签订合同</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showModal && <SelectionFormModal item={editData} onClose={() => setShowModal(false)} onSave={() => { setShowModal(false); loadData(); setToast('保存成功'); }} />}
                </div>
            );
        }

        // ============ Selection Workflow Stepper ============
        const STEPS = [
            { id: 1, label: '发布公告', key: '已发布' },
            { id: 2, label: '企业报名', key: '遴选中' },
            { id: 3, label: '确定备选', key: 'candidates' },
            { id: 4, label: '组织考察', key: 'inspections' },
            { id: 5, label: '确定入围', key: 'shortlisted' },
            { id: 6, label: '家长遴选', key: 'results' },
            { id: 7, label: '签订合同', key: 'contracts' }
        ];

        function SelectionWorkflowStepper({ currentStep, onStepClick }) {
            return (
                <div className="workflow-stepper">
                    {STEPS.map((step, idx) => {
                        const isCompleted = currentStep > step.id;
                        const isCurrent = currentStep === step.id;
                        const isClickable = onStepClick && (isCompleted || isCurrent);
                        return (
                            <div key={step.id} className={`step-item ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}`}>
                                <div className="step-indicator" onClick={isClickable ? () => onStepClick(step.id) : undefined}>
                                    {isCompleted ? '✓' : step.id}
                                </div>
                                <div className="step-label">{step.label}</div>
                                {idx < STEPS.length - 1 && <div className={`step-line ${isCompleted ? 'completed' : ''}`} />}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ============ Selection Form Modal ============
        function SelectionFormModal({ item, onClose, onSave }) {
            const [form, setForm] = useState(item || { serviceType: '食材供应', canteenId: '', title: '', content: '', requirements: '', publishUrl: '', registrationDeadline: '' });
            const [canteens, setCanteens] = useState([]);
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const { user } = useAuth();

            useEffect(() => {
                if (form.serviceType === '食材供应') {
                    setLoading(true);
                    apiFetch('/canteens').then(d => {
                        if (d) {
                            // Filter canteens for school user
                            const myCanteens = d.filter(c => {
                                // For school users, filter by their schoolId
                                if (user?.role === 'school') {
                                    return c.schoolId === user?.schoolId || c.schoolId === user?.id;
                                }
                                return true;
                            });
                            setCanteens(myCanteens);
                        }
                        setLoading(false);
                    });
                }
            }, [form.serviceType, user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                try {
                    const method = item ? 'PUT' : 'POST';
                    const url = item ? `/selection/announcements/${item.id}` : '/selection/announcements';
                    const d = await apiFetch(url, { method, body: JSON.stringify(form) });
                    if (d) {
                        onSave();
                    } else {
                        alert('保存失败，请重试');
                    }
                } catch (err) {
                    alert('保存失败：' + err.message);
                }
                setSaving(false);
            };

            const handleServiceTypeChange = (newType) => {
                setForm({ ...form, serviceType: newType, canteenId: '' });
            };

            const isViewMode = !!item;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{item ? '查看遴选公告' : '新建遴选公告'}</h3>
                            <button className="close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit} className="selection-form">
                            <div className="form-row">
                                <div className="form-group">
                                    <label>服务类型 <span className="required">*</span></label>
                                    <select
                                        value={form.serviceType}
                                        onChange={e => handleServiceTypeChange(e.target.value)}
                                        disabled={isViewMode}
                                        required
                                    >
                                        <option value="食材供应">食材供应</option>
                                        <option value="校外供餐">校外供餐</option>
                                    </select>
                                </div>
                                {form.serviceType === '食材供应' && (
                                    <div className="form-group">
                                        <label>所属食堂 <span className="required">*</span></label>
                                        {loading ? (
                                            <select disabled><option>加载中...</option></select>
                                        ) : (
                                            <select
                                                value={form.canteenId || ''}
                                                onChange={e => setForm({ ...form, canteenId: e.target.value })}
                                                disabled={isViewMode}
                                                required
                                            >
                                                <option value="">请选择食堂</option>
                                                {canteens.map(c => (
                                                    <option key={c.id} value={c.id}>
                                                        {c.name} ({c.operationMode})
                                                    </option>
                                                ))}
                                            </select>
                                        )}
                                    </div>
                                )}
                                {form.serviceType === '校外供餐' && (
                                    <div className="form-group">
                                        <label>说明</label>
                                        <p className="form-hint">校外供餐无需选择食堂，将关联到学校</p>
                                    </div>
                                )}
                            </div>

                            <div className="form-group">
                                <label>公告标题 <span className="required">*</span></label>
                                <input
                                    type="text"
                                    value={form.title}
                                    onChange={e => setForm({ ...form, title: e.target.value })}
                                    placeholder="请输入公告标题"
                                    disabled={isViewMode}
                                    required
                                />
                            </div>

                            <div className="form-group">
                                <label>公告内容</label>
                                <textarea
                                    value={form.content}
                                    onChange={e => setForm({ ...form, content: e.target.value })}
                                    placeholder="请输入公告详细内容"
                                    rows="4"
                                    disabled={isViewMode}
                                />
                            </div>

                            <div className="form-group">
                                <label>企业资质要求</label>
                                <textarea
                                    value={form.requirements}
                                    onChange={e => setForm({ ...form, requirements: e.target.value })}
                                    placeholder="请输入对报名企业的资质要求"
                                    rows="2"
                                    disabled={isViewMode}
                                />
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>发布网址</label>
                                    <input
                                        type="url"
                                        value={form.publishUrl}
                                        onChange={e => setForm({ ...form, publishUrl: e.target.value })}
                                        placeholder="http://..."
                                        disabled={isViewMode}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>报名截止日期 <span className="required">*</span></label>
                                    <input
                                        type="date"
                                        value={form.registrationDeadline}
                                        onChange={e => setForm({ ...form, registrationDeadline: e.target.value })}
                                        disabled={isViewMode}
                                        required

                            </div>

                            <div className="modal-footer">
                                <button type="button" className="btn" onClick={onClose}>取消</button>
                                {!isViewMode && <button type="submit" className="btn-primary" disabled={saving}>{saving ? '保存中...' : '保存'}</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ My Registrations Page (for enterprise users) ============
        function MyRegistrationsPage() {
            const [registrations, setRegistrations] = useState([]);
            const [loading, setLoading] = useState(true);
            const [announcements, setAnnouncements] = useState([]);
            const [toast, setToast] = useState(null);
            const [showRegisterModal, setShowRegisterModal] = useState(false);
            const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
            const [registrationForm, setRegistrationForm] = useState({ contactPerson: '', contactPhone: '', contactEmail: '', attachments: [] });
            const [activeTab, setActiveTab] = useState('registrations');
            const { user } = useAuth();

            const loadData = () => {
                setLoading(true);
                Promise.all([
                    apiFetch('/selection/my-registrations'),
                    apiFetch('/selection/announcements')
                ]).then(([regs, anns]) => {
                    if (regs) setRegistrations(regs);
                    if (anns) setAnnouncements(anns);
                    setLoading(false);
                });
            };

            useEffect(() => { loadData(); }, []);

            const handleRegister = (announcement) => {
                setSelectedAnnouncement(announcement);
                setShowRegisterModal(true);
            };

            const submitRegistration = async () => {
                const d = await apiFetch('/selection/registrations', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        ...registrationForm
                    })
                });
                if (d) {
                    setToast('报名成功');
                    setShowRegisterModal(false);
                    loadData();
                } else {
                    alert('报名失败');
                }
            };

            const getAnnouncementTitle = (id) => {
                const ann = announcements.find(a => a.id === id);
                return ann ? ann.title : id;
            };

            const statusClass = (status) => {
                if (status === '已受理') return 'status-success';
                if (status === '已拒绝') return 'status-danger';
                return 'status-warning';
            };

            // Get announcements that I haven't registered for yet
            const myRegAnnouncementIds = registrations.map(r => r.announcementId);
            const availableAnnouncements = announcements.filter(a =>
                (a.status === '已发布' || a.status === '遴选中') && !myRegAnnouncementIds.includes(a.id)
            );

            const isRegistered = (announcementId) => registrations.some(r => r.announcementId === announcementId);
            const getRegistrationStatus = (announcementId) => {

        function UserModal({ data, defaultMode, onSave, onClose }) {
            const [form, setForm] = useState(data ? { ...data } : { username: '', name: '', role: 'school', region: '' });
            const [mode, setMode] = useState(() => {
                if (!data) return 'edit';
                return defaultMode === 'edit' ? 'edit' : 'view';
            });
            const isView = mode === 'view';

            const roleLabels = {
                school: '学校用户',
                ingredientSupplier: '食材供应商',
                cateringCompany: '校外供餐企业',
                operationSupplier: '委托经营供应商',
                serviceSupplier: '委托服务提供商',
            };

            const handleSubmit = (e) => { e.preventDefault(); onSave(form); };

            const getDisplayValue = (val) => (val !== undefined && val !== null && val !== '') ? String(val) : '—';

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? (isView ? `查看用户 - ${form.name || form.username}` : `编辑用户 - ${form.name || form.username}`) : '新增用户'}</h3>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                {data && (
                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}
                                    </button>
                                )}
                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>

        // 解析OCR文本提取证照信息
        // 解析OCR文本提取证照信息
        function parseLicenseInfo(text) {
            const result = {
                name: '',
                licenseNo: '',
                type: '',
                legalPerson: '',
                validFrom: '',
                validUntil: '',
                businessScope: ''
            };

            if (!text) return result;

            console.log('开始解析OCR文本:', text);

            // 清理文本：统一全角半角符号
            const cleanText = text.replace(/[：:]/g, ':').replace(/，/g, ',').replace(/。/g, '.');

            // 证照类型识别（仅三种）
            if (/食品经营/.test(cleanText)) {
                result.type = '食品经营许可证';
            } else if (/营业执照/.test(cleanText)) {
                result.type = '营业执照';
            } else {
                result.type = '其他';
            }

            // 法人识别
            const personPatterns = [
                /(?:法定代表人|法人代表|法人)[:\s]*([^\n,，,.。]+)/i,
            ];
            for (const p of personPatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.legalPerson = match[1].trim();
                    break;
                }
            }

            // 证照编号识别 - 统一社会信用代码（18位）
            const licenseNoPatterns = [
                /([0-9A-Z]{18})/,           // 18位统一社会信用代码
            ];
            for (const p of licenseNoPatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.licenseNo = match[1];
                    break;
                }
            }

            // 名称识别 - 多种模式
            const namePatterns = [
                /(?:名称|Name|名字)[:\s]*([^\n,，,.。]+)/i,
                /([\u4e00-\u9fa5]{5,30}(?:有限公司|股份有限公司|集团|企业))/
            ];
            for (const p of namePatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.name = match[1].trim();
                    break;
                }
            }

            // 转换中文日期到ISO格式
            const convertDate = (str) => {
                if (!str || str === '长期') return str || '';
                let d = str.replace(/年/g, '-').replace(/月/g, '-').replace(/日/g, '');
                d = d.replace(/-+/g, '-').replace(/-$/, '');
                return d;
            };

            // 有效期识别 - 查找营业期限字段
            const termPatterns = [
                /(?:营业期限|有效期|validity)[:\s]*([0-9\u4e00-\u9fa5\-至]+)/i,
                /(?:营业期限|有效期)[:\s]*([0-9年\-月日]+)\s*至\s*([0-9年\-月日长期]+)/
            ];

            for (const tp of termPatterns) {
                const termMatch = cleanText.match(tp);
                if (termMatch) {
                    console.log('找到期限匹配:', termMatch[0]);
                    if (termMatch[2]) {
                        // 有两个日期
                        result.validFrom = convertDate(termMatch[1]);
                        result.validUntil = convertDate(termMatch[2]);
                    } else if (termMatch[1]) {
                        // 单个日期范围文本
                        const rangeMatch = termMatch[1].match(/([0-9年\-月日]+)\s*至?\s*([0-9年\-月日长期]+)?/);
                        if (rangeMatch) {
                            result.validFrom = convertDate(rangeMatch[1]);
                            result.validUntil = rangeMatch[2] ? convertDate(rangeMatch[2]) : '';
                        }
                    }
                    break;
                }
            }

            // 如果没有找到营业期限，尝试其他日期模式
            if (!result.validFrom || !result.validUntil) {
                const datePatterns = [
                    /([2][0][0-9][0-9][-\/][0-1][0-9][-\/][0-3][0-9])/g,
                    /([2][0][0-9][0-9]年[0-1]?[0-9]月[0-3]?[0-9]日)/g
                ];

                const allDates = [];
                for (const dp of datePatterns) {
                    let match;
                    const regex = new RegExp(dp.source, dp.flags);
                    while ((match = regex.exec(cleanText)) !== null) {
                        const d = convertDate(match[1]);
                        if (d && d !== '长期' && d.length >= 8) allDates.push(d);
                    }
                }

                if (allDates.length >= 2) {
                    const uniqueDates = [...new Set(allDates)].sort();
                    if (!result.validFrom) result.validFrom = uniqueDates[0];
                    if (!result.validUntil) result.validUntil = uniqueDates[uniqueDates.length - 1];
                }
            }

            // 经营范围识别
            const scopePatterns = [
                /(?:经营范围|业务范围|许可范围)[:\s]*([^\n]+)/i
            ];
            for (const p of scopePatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.businessScope = match[1].trim().substring(0, 200);
                    console.log('识别到经营范围:', result.businessScope);
                    break;
                }
            }

            console.log('解析结果:', result);
            return result;
        }

        function EnterpriseLicenseModal({ user, typeOptions, onSave, onClose }) {
            const [form, setForm] = useState({
                name: '', licenseNo: '', type: '营业执照', legalPerson: '',
                validFrom: '', validUntil: '', businessScope: '', imageUrl: ''
            });
            const [uploading, setUploading] = useState(false);
            const [ocring, setOcring] = useState(false);
            const [ocrProgress, setOcrProgress] = useState('');
            const [ocrRawResult, setOcrRawResult] = useState(null);
            const [ocrLicenseType, setOcrLicenseType] = useState('营业执照');
            const [previewUrl, setPreviewUrl] = useState('');
            const [imageFile, setImageFile] = useState(null);
            const [toast, setToast] = useState(null);

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setOcrRawResult(null);
                setImageFile(file);

                // 预览图片
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setPreviewUrl(ev.target.result);
                };
                reader.readAsDataURL(file);

                // 上传图片
                setUploading(true);
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const res = await fetch('/api/enterprise-licenses/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.url) {
                        setForm(f => ({ ...f, imageUrl: data.url }));
                        setToast({ message: '图片上传成功', type: 'success' });
                    }
                } catch (err) {
                    setToast({ message: '图片上传失败', type: 'error' });
                }
                setUploading(false);
            };

            // 使用后端百度OCR进行识别
            const runOcr = async () => {
                if (!imageFile) {
                    alert('请先上传证照图片');
                    return;
                }

                setOcring(true);
                setOcrProgress('正在识别...');

                try {
                    // 将图片转为Base64
                    const reader = new FileReader();
                    const base64Promise = new Promise((resolve, reject) => {
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(imageFile);
                    });
                    const base64 = await base64Promise;
                    const base64Data = base64.split(',')[1]; // 去掉data:image/xxx;base64,前缀

                    setOcrProgress('正在识别（调用百度OCR）...');

                    // 根据选择的证照类型调用对应的OCR API
                    const ocrApi = ocrLicenseType === '食品经营许可证'
                        ? '/api/ocr/food-license'
                        : '/api/ocr/business-license';

                    const res = await fetch(ocrApi, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('token')
                        },
                        body: JSON.stringify({ imageBase64: base64Data })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'OCR识别失败');
                    }

                    console.log('百度OCR识别结果:', data);

                    // 保存原始识别结果用于分析
                    setOcrRawResult(data);

                    // 更新表单
                    setForm(f => ({
                        ...f,
                        name: data.name || f.name,
                        licenseNo: data.licenseNo || f.licenseNo,
                        type: data.type || f.type,
                        legalPerson: data.legalPerson || f.legalPerson,
                        validFrom: data.validFrom || f.validFrom,
                        validUntil: data.validUntil || f.validUntil,
                        businessScope: data.businessScope || f.businessScope
                    }));

                    setToast({ message: 'OCR识别完成，请核对信息并手动修正', type: 'success' });
                } catch (err) {
                    console.error('OCR error:', err);
                    setToast({ message: 'OCR识别失败: ' + err.message, type: 'error' });
                }
                setOcring(false);
                setOcrProgress('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>新增证照</h3>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body" style={{maxHeight: '70vh', overflowY: 'auto'}}>
                                {/* 图片上传区域 */}
                                <div className="form-row" style={{marginBottom: 16}}>
                                    <div style={{border: '2px dashed #ccc', borderRadius: 8, padding: 20, textAlign: 'center', background: '#fafafa'}}>
                                        {previewUrl ? (
                                            <div>
                                                <img src={previewUrl} alt="证照预览" style={{maxWidth: '100%', maxHeight: 200, objectFit: 'contain', borderRadius: 4}} />
                                                <div style={{marginTop: 10}}>
                                                    <button type="button" className="btn btn-secondary btn-sm" onClick={() => {setPreviewUrl(''); setImageFile(null); setForm(f => ({...f, imageUrl: ''}));}}>移除图片</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div>
                                                <div style={{fontSize: 40, color: '#ccc', marginBottom: 10}}>📄</div>
                                                <div style={{color: '#666', marginBottom: 10}}>上传证照图片（支持JPG、PNG、PDF）</div>
                                                <input type="file" accept="image/*,.pdf" onChange={handleFileChange} style={{display: 'inline-block'}} />
                                            </div>
                                        )}
                                        {uploading && <div style={{marginTop: 10, color: '#666'}}>上传中...</div>}
                                    </div>
                                </div>

                                {/* OCR证照类型选择和识别按钮 */}
                                {previewUrl && (
                                    <div className="form-row" style={{marginBottom: 16}}>
                                        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
                                            <select
                                                value={ocrLicenseType}
                                                onChange={e => setOcrLicenseType(e.target.value)}
                                                style={{flex:1,padding:'8px 12px',borderRadius:4,border:'1px solid #ddd'}}
                                            >
                                                <option value="营业执照">营业执照</option>
                                                <option value="食品经营许可证">食品经营许可证</option>
                                            </select>
                                            <button type="button" className="btn btn-secondary" onClick={runOcr} disabled={ocring} style={{whiteSpace:'nowrap'}}>
                                                {ocring ? `识别中...` : '🔍 识别'}
                                            </button>
                                        </div>
                                        {!ocring && <small style={{color:'#666',display:'block'}}>提示：先选择证照类型，再点击识别。OCR结果仅供参考，请核对后手动修正</small>}
                                    </div>
                                )}

                                {/* OCR原始识别结果（用于调试分析） */}
                                {ocrRawResult && (
                                    <div className="form-row" style={{marginBottom: 16}}>
                                        <div style={{background:'#f5f5f5',padding:12,borderRadius:4,fontSize:12}}>
                                            <div style={{fontWeight:'bold',marginBottom:8,color:'#333'}}>🔍 OCR原始识别结果：</div>
                                            <textarea readOnly value={JSON.stringify(ocrRawResult, null, 2)} style={{width:'100%',height:ocrRawResult.words_result ? Math.min(ocrRawResult.words_result.length * 30 + 80, 400) : 150,fontFamily:'monospace',fontSize:11,background:'#fff',border:'1px solid #ddd',borderRadius:4,padding:8}} />
                                            {ocrRawResult.words_result && Array.isArray(ocrRawResult.words_result) && (
                                                <div style={{marginTop:8}}>
                                                    {ocrRawResult.words_result.slice(0, 20).map((item, idx) => (
                                                        <div key={idx} style={{marginBottom:4,borderBottom:'1px solid #eee',paddingBottom:2}}>
                                                            <span style={{color:'#666'}}>[{item.location ? `${item.location.width}x${item.location.height}@(${item.location.left},${item.location.top})` : 'N/A'}]</span> <span style={{color:'#333'}}>{item.words}</span>
                                                        </div>
                                                    ))}
                                                    {ocrRawResult.words_result.length > 20 && <div style={{color:'#666'}}>...还有 {ocrRawResult.words_result.length - 20} 条</div>}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* 证照基本信息 */}
                                <div className="form-row">
                                    <div className="form-group"><label>企业名称 *</label><input value={form.name} onChange={e => setForm({...form, name: e.target.value})} required /></div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group"><label>证照类型 *</label>
                                        <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} required>
                                            <option value="营业执照">营业执照</option>
                                            <option value="食品经营许可证">食品经营许可证</option>
                                            <option value="其他">其他</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group"><label>统一社会信用代码 *</label><input value={form.licenseNo} onChange={e => setForm({...form, licenseNo: e.target.value})} required /></div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group"><label>企业法人</label><input value={form.legalPerson} onChange={e => setForm({...form, legalPerson: e.target.value})} /></div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group"><label>有效期起 *</label><input type="date" value={form.validFrom} onChange={e => setForm({...form, validFrom: e.target.value})} required /></div>
                                    <div className="form-group"><label>有效期止 *</label><input type="date" value={form.validUntil} onChange={e => setForm({...form, validUntil: e.target.value})} required /></div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group"><label>经营项目（范围）</label><textarea value={form.businessScope} onChange={e => setForm({...form, businessScope: e.target.value})} rows={3} style={{width: '100%', resize: 'vertical'}} /></div>
                                </div>
                                {form.imageUrl && <input type="hidden" value={form.imageUrl} />}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>取消</button>
                                <button type="submit" className="btn btn-primary">保存</button>
                            </div>
                        </form>
                    </div>
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // ============ Enterprise My Info Page ============
        function MyInfoPage() {
            const { user } = useAuth();
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                if (!user?.role) return;
                let api = '';
                if (user.role === 'ingredientSupplier') api = '/ingredient-suppliers';
                else if (user.role === 'cateringCompany') api = '/catering-companies';
                else if (user.role === 'operationSupplier') api = '/operation-suppliers';
                else if (user.role === 'serviceSupplier') api = '/service-suppliers';

                if (api) apiFetch(api).then(d => { if (d && d.length > 0) { setData(d[0]); setLoading(false); } });
            }, [user]);

            const handleSave = async (formData) => {
                try {
                    await apiFetch(`${user.role === 'ingredientSupplier' ? '/ingredient-suppliers' : '/catering-companies'}/${data.id}`, {
                        method: 'PUT', body: JSON.stringify(formData)
                    });
                    setToast({ message: '保存成功', type: 'success' });
                } catch (e) { setToast({ message: e.message, type: 'error' }); }
            };

            if (loading) return <div className="empty-state"><p>加载中...</p></div>;
            if (!data) return <div className="empty-state"><p>暂无数据</p></div>;

            const fields = [
                { key: 'name', label: '企业名称' }, { key: 'code', label: '统一社会信用代码' },
                { key: 'companyType', label: '企业类型' }, { key: 'region', label: '所在区域' },
                { key: 'address', label: '详细地址' }, { key: 'legalPerson', label: '法定代表人' },
                { key: 'phone', label: '联系电话' }, { key: 'capital', label: '注册资本（万元）' },
                { key: 'establishDate', label: '成立日期' }, { key: 'businessScope', label: '经营范围' },
                ...(user.role === 'cateringCompany' ? [
                    { key: 'dailyCapacity', label: '日均供餐能力（份）' },
                    { key: '应急备选企业', label: '应急备选企业' }
                ] : [])
            ];

            return (
                <div>
                    <div className="page-header"><div><div className="page-title">企业信息</div><div className="page-breadcrumb">查看和编辑企业基本信息</div></div></div>
                    <div className="card">
                        <div className="card-header"><h3>基本信息</h3></div>
                        <div className="card-body">
                            <div className="form-row">
                                {fields.map(f => (
                                    <div key={f.key} className="form-group">
                                        <label>{f.label}</label>
                                        <input value={data[f.key] || ''} onChange={e => setData({...data, [f.key]: e.target.value})} />
                                    </div>
                                ))}
                            </div>
                            <div style={{marginTop: 16}}>
                                <button className="btn btn-primary" onClick={() => handleSave(data)}>保存修改</button>
                            </div>
                        </div>
                    </div>
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // ============ Main App ============
        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const { user } = useAuth();

            if (!user) return <LoginPage />;

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'schools': return <SchoolsPage />;
                    case 'canteens': return <CanteensPage />;
                    case 'ingredientSuppliers': return <SupplierListPage title="食材供应商" fetchApi="/ingredient-suppliers" editApi="/ingredient-suppliers" createApi="/ingredient-suppliers" deleteApi="/ingredient-suppliers" type="ingredient" />;
                    case 'cateringCompanies': return <SupplierListPage title="校外供餐企业" fetchApi="/catering-companies" editApi="/catering-companies" createApi="/catering-companies" deleteApi="/catering-companies" type="catering" />;
                    case 'operationSuppliers': return <SupplierListPage title="委托经营供应商" fetchApi="/operation-suppliers" editApi="/operation-suppliers" createApi="/operation-suppliers" deleteApi="/operation-suppliers" type="operation" />;
                    case 'serviceSuppliers': return <SupplierListPage title="委托服务提供商" fetchApi="/service-suppliers" editApi="/service-suppliers" createApi="/service-suppliers" deleteApi="/service-suppliers" type="service" />;
                    case 'credentials': return <CredentialsPage />;
                    case 'warnings': return <WarningsPage />;
                    case 'supplierLicenses': return <SupplierLicensesPage />;
                    case 'contracts': return <ContractsPage />;
                    case 'myContracts': return <MyContractsPage />;
                    case 'myLicenses': return <EnterpriseLicensesPage />;
                    case 'users': return <UsersPage />;
                    case 'myInfo': return <MyInfoPage />;
                    case 'selections': return <SelectionsPage />;
                    case 'selectionContracts': return <SelectionContractsPage />;
                    case 'myRegistrations': return <MyRegistrationsPage />;
                    case 'allSelections': return <AllSelectionsPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="app-layout">
                    <Sidebar currentPage={currentPage} onNavigate={setCurrentPage} />
                    <div className="main-content">
                        <AcademicYearHeader />
                        {renderPage()}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AuthProvider>
                <AcademicYearProvider>
                    <App />
                </AcademicYearProvider>
            </AuthProvider>
        );
    </script>
</body>
</html>
