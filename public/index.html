        function SupplierBatchImportModal({ title, type, api, onClose, onSuccess }) {
            const [mode, setMode] = useState('excel');
            const [file, setFile] = useState(null);
            const [jsonText, setJsonText] = useState('');
            const [error, setError] = useState('');
            const [uploading, setUploading] = useState(false);

            const typeFields = {
                ingredient: '主营产品类别 mainProducts',
                catering: '日均供餐能力 dailyCapacity、应急备选企业 emergencyBackup',
                operation: '食堂委托经营项目数 operatedCanteens',
                service: '服务范围 serviceScope'
            };

            const sample = {
                name: title + '示例企业',
                code: '91350000EXAMPLE001',
                companyType: '有限责任公司',
                region: '测试区域',
                address: '测试地址',
                legalPerson: '张三',
                phone: '13800000000',
                capital: '100',
                establishDate: '2026-01-01',
                businessScope: '经营范围说明',
                mainProducts: type === 'ingredient' ? '米面粮油、蔬菜' : undefined,
                dailyCapacity: type === 'catering' ? '1000' : undefined,
                emergencyBackup: type === 'catering' ? '否' : undefined,
                operatedCanteens: type === 'operation' ? '3' : undefined,
                serviceScope: type === 'service' ? '检测、培训、维保' : undefined
            };
            Object.keys(sample).forEach(key => sample[key] === undefined && delete sample[key]);

            const handleFileChange = (e) => {
                const f = e.target.files[0];
                if (!f) return;
                const ext = f.name.split('.').pop().toLowerCase();
                if (!['xlsx', 'xls'].includes(ext)) {
                    setError('仅支持 .xlsx 或 .xls 文件');
                    setFile(null);
                    return;
                }
                setError('');
                setFile(f);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setUploading(true);
                try {
                    let result;
                    if (mode === 'excel') {
                        if (!file) throw new Error('请选择 Excel 文件');
                        const formData = new FormData();
                        formData.append('file', file);
                        const token = localStorage.getItem('token');
                        const res = await fetch('/api' + api + '/batch-import-file', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${token}` },
                            body: formData
                        });
                        result = await res.json();
                        if (!res.ok) throw new Error(result.error || '导入失败');
                    } else {
                        const suppliers = JSON.parse(jsonText);
                        if (!Array.isArray(suppliers)) throw new Error('JSON 必须是数组格式');
                        result = await apiFetch(api + '/batch-import', {
                            method: 'POST',
                            body: JSON.stringify({ suppliers })
                        });
                    }
                    const failedText = result.failed ? `，失败 ${result.failed} 条：${(result.errors || []).slice(0, 3).join('；')}` : '';
                    alert(`导入成功 ${result.success} 条${failedText}`);
                    onSuccess && onSuccess();
                } catch (err) {
                    setError(err.message);
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: '620px'}}>
                        <div className="modal-header">
                            <h3>批量导入{title}</h3>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="role-tabs" style={{marginBottom: 16}}>
                                    <button type="button" className={`role-tab ${mode === 'excel' ? 'active' : ''}`} onClick={() => setMode('excel')}>Excel 文件</button>
                                    <button type="button" className={`role-tab ${mode === 'json' ? 'active' : ''}`} onClick={() => setMode('json')}>JSON 文本</button>
                                </div>
                                {mode === 'excel' ? (
                                    <div>
                                        <p style={{fontSize: 13, color: '#888', marginBottom: 12}}>请上传 Excel 文件，第一行作为表头。</p>
                                        <div className="form-group">
                                            <label>选择 Excel 文件</label>
                                            <input type="file" accept=".xlsx,.xls" onChange={handleFileChange} style={{padding: '8px'}} />
                                        </div>
                                        {file && <p style={{fontSize: 12, color: '#27ae60', marginTop: 4}}>已选择：{file.name}</p>}
                                        <p style={{fontSize: 12, color: '#888', marginTop: 12, lineHeight: 1.7}}>
                                            <strong>通用列：</strong>企业名称、统一社会信用代码、企业类型、所在区域、详细地址、法定代表人、联系电话、注册资本、成立日期、经营范围、学年<br/>
                                            <strong>当前类型扩展列：</strong>{typeFields[type] || '无'}
                                        </p>
                                    </div>
                                ) : (
                                    <div>
                                        <p style={{fontSize: 13, color: '#888', marginBottom: 12}}>请输入供应商数组，字段可使用中文表头或英文 key。</p>
                                        <div className="form-group">
                                            <textarea
                                                value={jsonText}
                                                onChange={e => setJsonText(e.target.value)}
                                                rows={12}
                                                placeholder={JSON.stringify([sample], null, 2)}
                                                style={{width: '100%', padding: '8px', fontFamily: 'monospace', fontSize: 12}}
                                            />
                                        </div>
                                    </div>
                                )}
                                {error && <p style={{color: '#e74c3c', fontSize: 13, marginTop: 8}}>{error}</p>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>取消</button>
                                <button type="submit" className="btn btn-primary" disabled={uploading}>{uploading ? '导入中...' : '导入'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ Supplier Form Modal ============
        function SupplierModal({ type, data, defaultMode, onSave, onClose }) {
            const [form, setForm] = useState(data ? { ...data } : getDefaultForm(type));
            const [mode, setMode] = useState(() => {
                if (!data) return 'edit';
                return defaultMode === 'edit' ? 'edit' : 'view';
            });
            const isView = mode === 'view';

            function getDefaultForm(t) {
                const base = { name: '', code: '', companyType: '有限责任公司', region: '', address: '', legalPerson: '', phone: '', capital: '', establishDate: '', businessScope: '' };
                if (t === 'ingredient') return { ...base, mainProducts: '' };
                if (t === 'catering') return { ...base, dailyCapacity: '', currentSupply: 0, 应急备选企业: '否' };
                if (t === 'operation') return { ...base, operatedCanteens: '' };
                return base;
            }

            const fields = [
                { key: 'name', label: '企业名称', type: 'text', required: true },
                { key: 'code', label: '统一社会信用代码', type: 'text', required: true },
                { key: 'companyType', label: '企业类型', type: 'select', options: ['有限责任公司','股份有限公司','国有企业','其他'], required: true },
                { key: 'region', label: '所在区域', type: 'text', required: true },
                { key: 'address', label: '详细地址', type: 'text', required: true },
                { key: 'legalPerson', label: '法定代表人', type: 'text', required: true },
                { key: 'phone', label: '联系电话', type: 'text', required: true },
                { key: 'capital', label: '注册资本（万元）', type: 'number', required: true },
                { key: 'establishDate', label: '成立日期', type: 'date', required: true },
                { key: 'businessScope', label: '经营范围', type: 'textarea', required: true },
                ...(type === 'ingredient' ? [{ key: 'mainProducts', label: '主营产品类别', type: 'text', required: false }] : []),
                ...(type === 'catering' ? [
                    { key: 'dailyCapacity', label: '日均供餐能力（份）', type: 'number', required: true },
                    { key: '应急备选企业', label: '应急备选企业', type: 'select', options: ['是','否'], required: true },
                ] : []),
                ...(type === 'operation' ? [{ key: 'operatedCanteens', label: '食堂委托经营项目数', type: 'number', required: false }] : []),
            ];

            const getDisplayValue = (val) => (val !== undefined && val !== null && val !== '') ? String(val) : '—';

            const renderField = (field) => {
                if (isView) {
                    if (field.type === 'select') {
                        const idx = field.options.indexOf(form[field.key]);
                        return <div className="modal-field-view">{idx >= 0 ? field.options[idx] : '—'}</div>;
                    }
                    if (field.type === 'textarea') {
                        return <div className="modal-field-view" style={{whiteSpace:'pre-wrap'}}>{getDisplayValue(form[field.key])}</div>;
                    }
                    return <div className="modal-field-view">{getDisplayValue(form[field.key])}</div>;
                }
                if (field.type === 'select') {
                    return (
                        <select value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required}>
                            <option value="">请选择</option>
                            {field.options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    );
                }
                if (field.type === 'textarea') {
                    return <textarea value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} rows={3} style={{width:'100%',padding:'10px',border:'2px solid #e8ecf0',borderRadius:'8px',fontSize:'14px',fontFamily:'inherit',resize:'vertical'}} />;
                }
                return <input type={field.type} value={form[field.key] || ''} onChange={e => setForm({...form, [field.key]: e.target.value})} required={field.required} />;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(form);
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? (isView ? `查看企业信息 - ${form.name}` : `编辑企业信息 - ${form.name}`) : '新增企业信息'}</h3>
                            <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                {data && (
                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}
                                    </button>
                                )}
                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    {fields.map(field => (
                                        <div key={field.key} className="form-group">
                                            <label>{field.label} {field.required && !isView && '*'}</label>
                                            {renderField(field)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!isView && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ Credentials Page ============
        function CredentialsPage() {
            const [credentials, setCredentials] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [showCertificateModal, setShowCertificateModal] = useState(false);
            const [toast, setToast] = useState(null);
            const [filterType, setFilterType] = useState('');
            const [search, setSearch] = useState('');

            const loadData = () => {
                setLoading(true);
                apiFetch('/credentials').then(d => { if (d) { setCredentials(d); setLoading(false); } });
            };
            useEffect(() => { loadData(); }, []);

            const getCredentialStatus = (cred) => {
                if (!cred.validUntil) return 'valid';
                const daysLeft = Math.ceil((new Date(cred.validUntil) - new Date()) / (1000 * 60 * 60 * 24));
                if (daysLeft <= 7) return 'red';
                if (daysLeft <= 30) return 'yellow';
                return 'green';
            };

            const statusLabel = { green: '有效', yellow: '即将到期', red: '已过期' };
            const statusBadge = { green: 'badge-green', yellow: 'badge-yellow', red: 'badge-red' };

            const filtered = credentials.filter(c => {
                if (filterType && c.type !== filterType) return false;
                if (search && !c.name?.includes(search) && !c.ownerName?.includes(search)) return false;
                return true;
            });

            const handleSave = async (formData) => {
                try {
                    const result = await apiFetch('/enterprise-licenses', { method: 'POST', body: JSON.stringify(formData) });
                    if (result?.requiresConfirmation) return result;
                    setToast({ message: '新增成功', type: 'success' });
                    setShowModal(false);
                    loadData();
                    return result;
                } catch (e) {
                    if (e.requiresConfirmation) return e;
                    setToast({ message: e.message, type: 'error' });
                    throw e;
                }
            };

            const handleCertificateSave = async (formData) => {
                try {
                    const result = await apiFetch('/credentials', { method: 'POST', body: JSON.stringify(formData) });
                    setToast({ message: '新增成功', type: 'success' });
                    setShowCertificateModal(false);
                    loadData();
                    return result;
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                    throw e;
                }
            };

            return (
                <div>
                    <div className="page-header">
                        <div><div className="page-title">证照管理</div><div className="page-breadcrumb">共 {credentials.length} 条证照记录</div></div>
                        <div className="btn-group">
                            <button className="btn btn-secondary" onClick={() => setShowCertificateModal(true)}>+ 新增证书</button>
                            <button className="btn btn-primary" onClick={() => setShowModal(true)}>+ 新增证照</button>
                        </div>
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <div className="filter-bar">
                                <input className="search-input" placeholder="搜索证照名称..." value={search} onChange={e => setSearch(e.target.value)} />
                                <select className="filter-select" value={filterType} onChange={e => setFilterType(e.target.value)}>
                                    <option value="">全部类型</option>
                                    <option value="营业执照">营业执照</option>
                                    <option value="食品经营许可证">食品经营许可证</option>
                                    <option value="食品生产许可证">食品生产许可证</option>
                                    <option value="卫生许可证">卫生许可证</option>
                                    <option value="ISO认证体系证书">ISO认证体系证书</option>
                                    <option value="相关服务资质证书">相关服务资质证书</option>
                                    <option value="行业特殊许可证">行业特殊许可证</option>
                                </select>
                            </div>
                            <div className="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>证照名称</th>
                                            <th>主体类型</th>
                                            <th>证照编号</th>
                                            <th>有效期</th>
                                            <th>原件</th>
                                            <th>状态</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 && <tr><td colSpan="6" style={{textAlign:'center',color:'#999',padding:'40px'}}>暂无数据</td></tr>}
                                        {filtered.map(c => {
                                            const status = getCredentialStatus(c);
                                            return (
                                                <tr key={c.id}>
                                                    <td>{c.name}</td>
                                                    <td>{c.ownerType}</td>
                                                    <td>{c.licenseNo}</td>
                                                    <td>{c.validFrom} 至 {c.validUntil}</td>
                                                    <td>{c.imageUrl ? <a href={c.imageUrl} target="_blank" rel="noreferrer">查看</a> : '-'}</td>
                                                    <td><span className={`badge ${statusBadge[status]}`}>{statusLabel[status]}</span></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    {showModal && <EnterpriseLicenseCreateWizard user={JSON.parse(localStorage.getItem('user') || 'null')} onSave={handleSave} onClose={() => setShowModal(false)} />}
                    {showCertificateModal && <CredentialModal onSave={handleCertificateSave} onClose={() => setShowCertificateModal(false)} />}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

                                    <div className="form-group"><label>有效期起 *</label><input type="date" value={form.validFrom} onChange={e => setForm({...form, validFrom: e.target.value})} required /></div>
                                    <div className="form-group"><label>有效期止 *</label><input type="date" value={form.validUntil} onChange={e => setForm({...form, validUntil: e.target.value})} required /></div>

        // ============ Contracts Page ============
        function ContractsPage() {
            const [contracts, setContracts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editData, setEditData] = useState(null);
            const [toast, setToast] = useState(null);
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('');

            const loadData = () => {
                setLoading(true);
                apiFetch('/contracts').then(d => { if (d) { setContracts(d); setLoading(false); } });
            };
            useEffect(() => { loadData(); }, []);

            const filtered = contracts.filter(c => {
                if (search && !c.contractName?.includes(search) && !c.contractNo?.includes(search) && !c.ownerName?.includes(search)) return false;
                if (filterStatus && c.status !== filterStatus) return false;
                return true;
            });

            const handleSave = async (formData) => {
                try {
                    if (editData) {
                        await apiFetch(`/contracts/${editData.id}`, { method: 'PUT', body: JSON.stringify(formData) });
                    } else {
                        await apiFetch('/contracts', { method: 'POST', body: JSON.stringify(formData) });
                    }
                    setToast({ message: '保存成功', type: 'success' });
                    setShowModal(false);
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('确认删除该合同？')) return;
                await apiFetch(`/contracts/${id}`, { method: 'DELETE' });
                setToast({ message: '删除成功', type: 'success' });
                loadData();
            };

            // Calculate status based on dates
            const getDisplayStatus = (c) => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                if (c.startDate) {
                    const startDate = new Date(c.startDate);
                    if (startDate > today) return '未生效';
                }
                if (c.endDate) {
                    const endDate = new Date(c.endDate);
                    if (endDate < today) return '终止';
                }
                return '有效';
            };

            const statusBadge = {
                '未生效': 'badge-yellow',
                '有效': 'badge-green',
                '终止': 'badge-red'
            };

            return (
                <div>
                    <div className="page-header">
                        <div><div className="page-title">合同管理</div><div className="page-breadcrumb">共 {contracts.length} 份合同</div></div>
                        <button className="btn btn-primary" onClick={() => { setEditData(null); setShowModal(true); }}>+ 新增合同</button>
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <div className="filter-bar">
                                <select className="filter-select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                    <option value="">全部状态</option>
                                    <option value="未生效">未生效</option>
                                    <option value="有效">有效</option>
                                    <option value="终止">终止</option>
                                </select>
                                <input className="search-input" placeholder="搜索合同名称/编号/供应商..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>合同编号</th>
                                            <th>合同名称</th>
                                            <th>供应商</th>
                                            <th>关联食堂</th>
                                            <th>签约日期</th>
                                            <th>到期日期</th>
                                            <th>金额(元)</th>
                                            <th>餐标</th>
                                            <th>用餐人数</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.length === 0 && <tr><td colSpan="11" style={{textAlign:'center',color:'#999',padding:'40px'}}>暂无数据</td></tr>}
                                        {filtered.map(c => (
                                            <tr key={c.id}>
                                                <td>{c.contractNo}</td>
                                                <td>{c.contractName}</td>
                                                <td>{c.ownerName}</td>
                                                <td>{c.relatedCanteenName}</td>
                                                <td>{c.signDate}</td>
                                                <td>{c.endDate}</td>
                                                <td>{c.amount ? Number(c.amount).toLocaleString() : '-'}</td>
                                                <td>{c.mealStandard || '-'}</td>
                                                <td>{c.dinerCount || '-'}</td>
                                                <td><span className={`badge ${statusBadge[getDisplayStatus(c)] || 'badge-gray'}`}>{getDisplayStatus(c)}</span></td>
                                                <td>
                                                    <div className="btn-group">
                                                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(c); setShowModal(true); }}>查看</button>
                                                        <button className="btn btn-secondary btn-sm" onClick={() => { setEditData(c); setShowModal(true); }}>编辑</button>
                                                        <button className="btn btn-danger btn-sm" onClick={() => handleDelete(c.id)}>删除</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    {showModal && <ContractModal data={editData} onSave={handleSave} onClose={() => setShowModal(false)} />}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function ContractModal({ data, onSave, onClose }) {
            const [schools, setSchools] = useState([]);
            const [canteens, setCanteens] = useState([]);
            const [suppliers, setSuppliers] = useState({ ingredient: [], catering: [], operation: [] });
            const { user } = useAuth();

            // Helper to map ownerType to supplierType
            const ownerTypeToSupplierType = (ownerType) => {
                if (ownerType === '食材供应商') return 'ingredientSupplier';
                if (ownerType === '校外供餐企业') return 'cateringCompany';
                if (ownerType === '委托经营供应商') return 'operationSupplier';
                return '';
            };

            // Auto-generate contract name based on type and dates
            const generateContractName = (supplierType, startDate, endDate) => {
                const typeMap = {
                    'ingredientSupplier': '食材供应合同',
                    'cateringCompany': '校外供餐合同',
                    'operationSupplier': '委托经营合同'
                };
                const typeName = typeMap[supplierType] || '服务合同';
                if (startDate && endDate) {
                    const start = new Date(startDate);
                    const end = new Date(endDate);
                    const startStr = `${start.getFullYear()}年${String(start.getMonth() + 1).padStart(2, '0')}月`;
                    const endStr = `${end.getFullYear()}年${String(end.getMonth() + 1).padStart(2, '0')}月`;
                    return `${startStr}至${endStr}${typeName}`;
                }
                return typeName;
            };

            const [form, setForm] = useState(() => {
                if (data) {
                    // Editing existing contract - map stored data to form fields
                    const supplierType = ownerTypeToSupplierType(data.ownerType);
                    return {
                        schoolId: data.relatedSchoolId || '',
                        canteenId: data.relatedCanteenName === '校外供餐' ? '校外供餐' : (data.relatedCanteenId || ''),
                        supplierType: supplierType,
                        supplierId: data.ownerId || '',
                        contractNo: data.contractNo || '',
                        contractName: data.contractName || '',
                        contractType: data.contractType || '食材供应合同',
                        signDate: data.signDate || '',
                        startDate: data.startDate || '',
                        endDate: data.endDate || '',
                        amount: data.amount || '',
                        mealStandard: data.mealStandard || '',
                        dinerCount: data.dinerCount || '',
                        paymentTerms: data.paymentTerms || '按月支付',
                        remarks: data.remarks || '',
                    };
                }
                // New contract - for school users, pre-fill schoolId
                return {
                    schoolId: user?.role === 'school' ? user.schoolId : '',
                    canteenId: '', contractType: '', supplierType: '', supplierId: '',
                    contractNo: '', contractName: '',
                    signDate: '', startDate: '', endDate: '', amount: '', mealStandard: '', dinerCount: '', paymentTerms: '按月支付', remarks: ''
                };
            });

            // Auto-calculate status based on dates
            const getAutoStatus = (start, end) => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                if (start) {
                    const startDate = new Date(start);
                    if (startDate > today) return '未生效';
                }
                if (end) {
                    const endDate = new Date(end);
                    if (endDate < today) return '终止';
                }
                return '有效';
            };

            const autoStatus = getAutoStatus(form.startDate, form.endDate);

            useEffect(() => {
                Promise.all([
                    apiFetch('/schools'),
                    apiFetch('/canteens'),
                    apiFetch('/ingredient-suppliers'),
                    apiFetch('/catering-companies'),
                    apiFetch('/operation-suppliers'),
                ]).then(([s, c, ing, cat, op]) => {
                    setSchools(s || []);
                    setCanteens(c || []);
                    setSuppliers({ ingredient: ing || [], catering: cat || [], operation: op || [] });
                });
            }, []);

            // Determine supplier type based on canteen or school
            const getSupplierType = () => {
                if (form.canteenId === '校外供餐') return 'cateringCompany';
                if (form.canteenId) {
                    const canteen = canteens.find(c => c.id === form.canteenId);
                    if (canteen) {
                        if (canteen.operationMode === '自营') return 'ingredientSupplier';
                        if (canteen.operationMode === '委托经营') return 'operationSupplier';
                    }
                }
                // Check school if no canteen selected
                if (form.schoolId) {
                    const school = schools.find(s => s.id === form.schoolId);
                    if (school?.供餐类型?.includes('校外供餐')) return 'cateringCompany';
                }
                return '';
            };

            // Auto-update supplier type and contract name when canteen changes
            useEffect(() => {
                if (!data) {
                    const st = getSupplierType();
                    const newName = generateContractName(st, form.startDate, form.endDate);
                    setForm(f => ({ ...f, supplierType: st, supplierId: '', contractName: newName }));
                }
            }, [form.schoolId, form.canteenId]);

            // Auto-update contract name when supplierType or dates change
            useEffect(() => {
                if (!data) {
                    const newName = generateContractName(form.supplierType, form.startDate, form.endDate);
                    setForm(f => ({ ...f, contractName: newName }));
                }
            }, [form.supplierType, form.startDate, form.endDate]);

            const supplierTypeName = {
                ingredientSupplier: '食材供应商',
                cateringCompany: '校外供餐企业',
                operationSupplier: '委托经营供应商'
            };

            const currentSuppliers = form.supplierType === 'ingredientSupplier' ? suppliers.ingredient
                : form.supplierType === 'cateringCompany' ? suppliers.catering
                : form.supplierType === 'operationSupplier' ? suppliers.operation : [];

            const handleSubmit = (e) => {
                e.preventDefault();
                const school = schools.find(s => s.id === form.schoolId);
                const canteen = canteens.find(c => c.id === form.canteenId);
                const supplier = currentSuppliers.find(s => s.id === form.supplierId);
                const calculatedStatus = getAutoStatus(form.startDate, form.endDate);

                const saveData = {
                    ...form,
                    relatedSchoolId: form.schoolId,
                    relatedSchoolName: school?.name || '',
                    relatedCanteenId: form.canteenId === '校外供餐' ? '' : (form.canteenId || ''),
                    relatedCanteenName: form.canteenId === '校外供餐' ? '校外供餐' : (canteen?.name || ''),
                    ownerId: supplier?.id || '',
                    ownerName: supplier?.name || '',
                    ownerType: supplierTypeName[form.supplierType] || '',
                    status: calculatedStatus,
                };
                onSave(saveData);
            };

            const school = schools.find(s => s.id === form.schoolId);
            // 校内供餐：显示食堂选择；校外供餐：显示校外供餐选项
            const hasInsideCatering = school?.供餐类型?.includes('校内供餐');
            const hasOutsideCatering = school?.供餐类型?.includes('校外供餐');
            const schoolCanteens = canteens.filter(c => c.schoolId === form.schoolId);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{data ? '查看合同' : '新增合同'}</h3>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>学校 {user?.role === 'school' && !data ? '' : '*'}</label>
                                        {user?.role === 'school' && !data ? (
                                            <div className="modal-field-view">{schools.find(s => s.id === form.schoolId)?.name || '本校'}</div>
                                        ) : (
                                            <select value={form.schoolId} onChange={e => setForm({...form, schoolId: e.target.value, canteenId: '', supplierType: '', supplierId: ''})} required disabled={!!data}>
                                                <option value="">请选择学校</option>
                                                {schools.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        )}
                                    </div>
                                    <div className="form-group">
                                        <label>食堂/供餐类型</label>
                                        <select value={form.canteenId} onChange={e => setForm({...form, canteenId: e.target.value, supplierId: ''})} disabled={!!data}>
                                            <option value="">请选择</option>
                                            {hasInsideCatering && schoolCanteens.filter(c => c.operationMode === '自营').map(c => (
                                                <option key={c.id} value={c.id}>{c.name}（自营）</option>
                                            ))}
                                            {hasInsideCatering && schoolCanteens.filter(c => c.operationMode === '委托经营').map(c => (
                                                <option key={c.id} value={c.id}>{c.name}（委托经营）</option>
                                            ))}
                                            {hasOutsideCatering && <option value="校外供餐">校外供餐</option>}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>供应商类型</label>
                                        <select value={form.supplierType} disabled style={{backgroundColor:'#f0f0f0'}}>
                                            <option value="">请先选择学校和食堂</option>
                                            {form.supplierType === 'ingredientSupplier' && <option value="ingredientSupplier">食材供应商</option>}
                                            {form.supplierType === 'cateringCompany' && <option value="cateringCompany">校外供餐企业</option>}
                                            {form.supplierType === 'operationSupplier' && <option value="operationSupplier">委托经营供应商</option>}
                                        </select>
                                        {!data && <small style={{color:'#666'}}>
                                            {form.supplierType === 'ingredientSupplier' ? '（根据自营食堂自动匹配）' :
                                             form.supplierType === 'operationSupplier' ? '（根据委托经营食堂自动匹配）' :
                                             form.supplierType === 'cateringCompany' ? '（根据校外供餐学校自动匹配）' : ''}
                                        </small>}
                                    </div>
                                    <div className="form-group">
                                        <label>供应商 *</label>
                                        <select value={form.supplierId} onChange={e => setForm({...form, supplierId: e.target.value})} required disabled={!!data || !form.supplierType}>
                                            <option value="">请选择供应商</option>
                                            {currentSuppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>合同编号 *</label>
                                        <input type="text" value={form.contractNo} onChange={e => setForm({...form, contractNo: e.target.value})} required disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同名称 *</label>
                                        <input type="text" value={form.contractName} onChange={e => setForm({...form, contractName: e.target.value})} required disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>签约日期</label>
                                        <input type="date" value={form.signDate} onChange={e => setForm({...form, signDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同开始日期</label>
                                        <input type="date" value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同结束日期</label>
                                        <input type="date" value={form.endDate} onChange={e => setForm({...form, endDate: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>合同金额(元)</label>
                                        <input type="number" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>餐标</label>
                                        <input type="text" value={form.mealStandard} onChange={e => setForm({...form, mealStandard: e.target.value})} placeholder="如：15元/人/餐" disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>用餐人数</label>
                                        <input type="number" min="0" value={form.dinerCount} onChange={e => setForm({...form, dinerCount: e.target.value})} disabled={!!data} />
                                    </div>
                                    <div className="form-group">
                                        <label>付款方式</label>
                                        <select value={form.paymentTerms} onChange={e => setForm({...form, paymentTerms: e.target.value})} disabled={!!data}>
                                            <option value="按月支付">按月支付</option>
                                            <option value="按学期支付">按学期支付</option>
                                            <option value="按年支付">按年支付</option>
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>状态</label>
                                        <div className="modal-field-view" style={{padding:'8px 0'}}>
                                            <span className={`badge ${autoStatus === '有效' ? 'badge-green' : autoStatus === '未生效' ? 'badge-yellow' : 'badge-red'}`}>{autoStatus}</span>
                                            {data && <small style={{marginLeft:8,color:'#999'}}>（根据日期自动判断）</small>}
                                        </div>
                                    </div>
                                    <div className="form-group" style={{flexBasis:'100%'}}>
                                        <label>备注</label>
                                        <textarea value={form.remarks} onChange={e => setForm({...form, remarks: e.target.value})} rows={2} style={{width:'100%',padding:'10px',border:'2px solid #e8ecf0',borderRadius:'8px',fontSize:'14px'}} disabled={!!data} />
                                    </div>
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!data && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ============ Selections Page (for school users) ============
        function SelectionsPage() {
            const [announcements, setAnnouncements] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [showPublishModal, setShowPublishModal] = useState(false);
            const [publishForm, setPublishForm] = useState({ title: '', content: '', publishUrl: '', registrationDeadline: '' });
            const [editData, setEditData] = useState(null);
            const [toast, setToast] = useState(null);
            const [statusFilter, setStatusFilter] = useState('');
            const [search, setSearch] = useState('');
            const [activeTab, setActiveTab] = useState('announcements');
            const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
            const [currentStep, setCurrentStep] = useState(1);
            // 流程数据
            const [registrations, setRegistrations] = useState([]);
            const [candidates, setCandidates] = useState([]);
            const [inspections, setInspections] = useState([]);
            const [shortlisted, setShortlisted] = useState([]);
            const [results, setResults] = useState([]);
            const [selectedCandidateIds, setSelectedCandidateIds] = useState([]);
            const [inspectionForm, setInspectionForm] = useState(null);
            const [workgroupForm, setWorkgroupForm] = useState({ memberCount: '', parentCount: '' });
            const [emergencyEnterpriseIds, setEmergencyEnterpriseIds] = useState([]);
            const [emergencySupplementIds, setEmergencySupplementIds] = useState([]);
            const { user } = useAuth();

            const statusToStep = (status) => ({
                '项目已立项': 1,
                '草稿': 1,
                '已发布': 1,
                '报名审核中': 2,
                '备选确认中': 3,
                '考察中': 4,
                '入围确认中': 5,
                '家长投票中': 6,
                '待签合同': 7,
                '已完成': 8
            }[status] || 1);

            const acceptedRegistrations = registrations.filter(r => ['审核通过', '已受理'].includes(r.status));
            const currentCandidateIds = selectedCandidateIds;
            const candidateRegistrations = registrations.filter(r => currentCandidateIds.includes(r.enterpriseId));
            const latestInspectionsByEnterprise = Array.from(
                inspections.reduce((map, inspection) => {
                    const current = map.get(inspection.enterpriseId);
                    const currentTime = new Date(current?.updatedAt || current?.createdAt || 0).getTime();
                    const nextTime = new Date(inspection.updatedAt || inspection.createdAt || 0).getTime();
                    if (!current || nextTime >= currentTime) map.set(inspection.enterpriseId, inspection);
                    return map;
                }, new Map()).values()
            );
            const passedInspections = latestInspectionsByEnterprise.filter(i => i.announcementId === selectedAnnouncement?.id && i.passed === true);
            const latestShortlisted = shortlisted.find(s => s.announcementId === selectedAnnouncement?.id);
            const shortlistedEnterprises = latestShortlisted?.shortlistedEnterprises?.length
                ? latestShortlisted.shortlistedEnterprises
                : passedInspections.map(i => ({ enterpriseId: i.enterpriseId, enterpriseName: i.enterpriseName }));
            const finalResult = results.find(r => r.announcementId === selectedAnnouncement?.id && (r.status === '已确定' || r.winningEnterprise));
            const latestRevoteResult = results.find(r => r.announcementId === selectedAnnouncement?.id && r.status === '需二次投票');
            const latestResult = finalResult;
            const isWorkflowViewOnly = selectedAnnouncement?.status === '已完成';
            const isExternalCateringSelection = selectedAnnouncement?.serviceType === '校外供餐';
            const hasWorkgroupRegistration = !isExternalCateringSelection || !!selectedAnnouncement?.workgroupRegisteredAt;
            const workgroupMemberCount = Number(workgroupForm.memberCount || 0);
            const workgroupParentCount = Number(workgroupForm.parentCount || 0);
            const workgroupParentRatio = workgroupMemberCount > 0 ? workgroupParentCount / workgroupMemberCount : 0;
            const emergencyEnterpriseIdSet = new Set(emergencyEnterpriseIds);
            const hasRegularAcceptedRegistration = acceptedRegistrations.some(r => !emergencyEnterpriseIdSet.has(r.enterpriseId));
            const selectableCandidateRegistrations = isExternalCateringSelection && hasRegularAcceptedRegistration
                ? acceptedRegistrations.filter(r => !emergencyEnterpriseIdSet.has(r.enterpriseId))
                : acceptedRegistrations;
            const latestCandidate = candidates[0];
            const hasEmergencySupplementCandidate = latestCandidate?.source === 'emergencySupplement';
            const regularCandidateRegistrations = candidateRegistrations.filter(r => !emergencyEnterpriseIdSet.has(r.enterpriseId));
            const regularCandidateIds = regularCandidateRegistrations.map(r => r.enterpriseId);
            const regularInspections = latestInspectionsByEnterprise.filter(i => regularCandidateIds.includes(i.enterpriseId));
            const emergencyAcceptedRegistrations = acceptedRegistrations.filter(r => emergencyEnterpriseIdSet.has(r.enterpriseId));
            const currentCandidateInspectionIds = new Set(
                latestInspectionsByEnterprise
                    .filter(i => currentCandidateIds.includes(i.enterpriseId) && (i.passed === true || i.passed === false))
                    .map(i => i.enterpriseId)
            );
            const areCurrentCandidateInspectionsComplete = currentCandidateIds.length > 0
                && currentCandidateIds.every(id => currentCandidateInspectionIds.has(id));
            const canEnableEmergencySupplement = isExternalCateringSelection
                && !hasEmergencySupplementCandidate
                && regularCandidateIds.length > 0
                && regularCandidateIds.length < 3
                && regularInspections.length === regularCandidateIds.length
                && regularInspections.every(i => i.passed === false)
                && emergencyAcceptedRegistrations.length > 0;
            const voteTotal = (rows) => (rows || []).reduce((sum, row) => sum + Number(row.votes || 0), 0);

            const loadData = () => {
                setLoading(true);
                apiFetch('/selection/announcements').then(d => { if (d) { setAnnouncements(d); setLoading(false); } });
            };

            useEffect(() => { loadData(); }, []);

            const handleCreate = () => { setEditData(null); setShowModal(true); };
            const handleEdit = (item) => { setEditData(item); setShowModal(true); };

            const handleDelete = async (id) => {
                if (!confirm('确定删除此公告？')) return;
                const d = await apiFetch(`/selection/announcements/${id}`, { method: 'DELETE' });
                if (d) { setToast('删除成功'); loadData(); }
            };

            const openPublishModal = () => {
                if (!hasWorkgroupRegistration) {
                    alert('请先完成校外供餐遴选工作小组登记');
                    return;
                }
                setPublishForm({
                    title: selectedAnnouncement?.title || '',
                    content: selectedAnnouncement?.content || '',
                    publishUrl: selectedAnnouncement?.publishUrl || '',
                    registrationDeadline: selectedAnnouncement?.registrationDeadline || ''
                });
                setShowPublishModal(true);
            };

            const handlePublish = async (id) => {
                try {
                    const saved = await apiFetch(`/selection/announcements/${id}`, {
                        method: 'PUT',
                        body: JSON.stringify(publishForm)
                    });
                    if (!saved) return;
                    const d = await apiFetch(`/selection/announcements/${id}/publish`, { method: 'POST' });
                    if (d) {
                        setToast('公告发布成功');
                        setShowPublishModal(false);
                        if (selectedAnnouncement?.id === id) {
                            setSelectedAnnouncement(d);
                            setCurrentStep(statusToStep(d.status));
                            handleManageWorkflow(d);
                        }
                        loadData();
                    }
                } catch (err) {
                    alert(err.message || '公告发布失败');
                }
            };

            const handleClose = async (id) => {
                const d = await apiFetch(`/selection/announcements/${id}/close`, { method: 'POST' });
                if (d) { setToast('已结束'); loadData(); }
            };

            const handleManageWorkflow = (announcement) => {
                setSelectedAnnouncement(announcement);
                setWorkgroupForm({
                    memberCount: announcement.workgroupMemberCount ?? '',
                    parentCount: announcement.workgroupParentCount ?? ''
                });
                // 加载现有数据
                Promise.all([
                    apiFetch(`/selection/announcements/${announcement.id}/registrations`),
                    apiFetch('/selection/candidates'),
                    apiFetch('/selection/inspections'),
                    apiFetch('/selection/shortlisted'),
                    apiFetch('/selection/results'),
                    announcement.serviceType === '校外供餐' ? apiFetch('/catering-companies') : Promise.resolve([])
                ]).then(([regs, cands, insps, shorts, res, companies]) => {
                    setRegistrations(regs || []);
                    const emergencyIds = (companies || [])
                        .filter(company => company.应急备选企业 === '是' || company.emergencyBackup === '是')
                        .map(company => company.id);
                    setEmergencyEnterpriseIds(emergencyIds);
                    const emergencyIdSet = new Set(emergencyIds);
                    const annCands = (cands || []).filter(c => c.announcementId === announcement.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setCandidates(annCands);
                    setInspections((insps || []).filter(i => i.announcementId === announcement.id));
                    setShortlisted((shorts || []).filter(s => s.announcementId === announcement.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                    setResults((res || []).filter(r => r.announcementId === announcement.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                    const acceptedIds = (regs || [])
                        .filter(r => ['审核通过', '已受理'].includes(r.status))
                        .map(r => r.enterpriseId);
                    const hasRegularAccepted = (regs || [])
                        .filter(r => ['审核通过', '已受理'].includes(r.status))
                        .some(r => !emergencyIdSet.has(r.enterpriseId));
                    const selectableIds = announcement.serviceType === '校外供餐' && hasRegularAccepted
                        ? acceptedIds.filter(id => !emergencyIdSet.has(id))
                        : acceptedIds;
                    setSelectedCandidateIds(annCands[0]?.confirmedEnterprises?.map(e => e.enterpriseId) || selectableIds);
                    const emergencyAcceptedIds = (regs || [])
                        .filter(r => ['审核通过', '已受理'].includes(r.status) && emergencyIdSet.has(r.enterpriseId))
                        .map(r => r.enterpriseId);
                    setEmergencySupplementIds(emergencyAcceptedIds.length < 5 ? emergencyAcceptedIds : emergencyAcceptedIds.slice(0, 5));
                    setCurrentStep(statusToStep(announcement.status));
                });
                setActiveTab('workflow');
            };

            const handleSaveWorkgroup = async () => {
                const memberCount = Number(workgroupForm.memberCount);
                const parentCount = Number(workgroupForm.parentCount);
                if (!Number.isInteger(memberCount) || memberCount <= 0) {
                    alert('成员总人数必须大于0');
                    return;
                }
                if (!Number.isInteger(parentCount) || parentCount < 0) {
                    alert('家长人数不能小于0');
                    return;
                }
                if (parentCount > memberCount) {
                    alert('家长人数不能超过成员总人数');
                    return;
                }
                if (parentCount / memberCount < 0.8) {
                    alert('家长人数占比不低于80%');
                    return;
                }
                const d = await apiFetch(`/selection/announcements/${selectedAnnouncement.id}/workgroup`, {
                    method: 'PUT',
                    body: JSON.stringify({ memberCount, parentCount })
                });
                if (d) {
                    setToast('工作小组登记已保存');
                    setSelectedAnnouncement(d);
                    setWorkgroupForm({
                        memberCount: d.workgroupMemberCount ?? '',
                        parentCount: d.workgroupParentCount ?? ''
                    });
                    loadData();
                }
            };

            const rollbackWorkflow = async () => {
                const reason = prompt('请输入退回原因');
                if (!reason) return;
                const d = await apiFetch(`/selection/announcements/${selectedAnnouncement.id}/rollback`, {
                    method: 'POST',
                    body: JSON.stringify({ reason })
                });
                if (d) {
                    setToast('已退回前一步');
                    setSelectedAnnouncement(d);
                    setCurrentStep(statusToStep(d.status));
                    loadData();
                    handleManageWorkflow(d);
                }
            };

            // 步骤2: 录入并审核报名企业
            const [showAddRegModal, setShowAddRegModal] = useState(false);
            const [newReg, setNewReg] = useState({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
            const [enterpriseList, setEnterpriseList] = useState([]);
            const formatRegistrationEnterpriseName = (enterprise) => {
                const isEmergencyBackup = enterprise?.应急备选企业 === '是' || enterprise?.emergencyBackup === '是';
                if (selectedAnnouncement?.serviceType === '校外供餐' && isEmergencyBackup) {
                    return `${enterprise.name}（应急备选）`;
                }
                return enterprise?.name || '';
            };
            const formatRegisteredEnterpriseName = (registration) => {
                if (isExternalCateringSelection && emergencyEnterpriseIdSet.has(registration.enterpriseId)) {
                    return `${registration.enterpriseName}（应急备选）`;
                }
                return registration.enterpriseName;
            };

            const openAddRegModal = async () => {
                try {
                    // 根据服务类型获取企业列表
                    const serviceType = selectedAnnouncement?.serviceType;
                    let url = '';
                    if (serviceType === '食材供应') {
                        url = '/ingredient-suppliers';
                    } else if (serviceType === '校外供餐') {
                        url = '/catering-companies';
                    } else {
                        url = '/catering-companies';
                    }
                    const enterprises = await apiFetch(url);
                    console.log('enterprises:', enterprises);
                    if (enterprises) {
                        setEnterpriseList(enterprises);
                    }
                    setNewReg({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
                    setShowAddRegModal(true);
                } catch (err) {
                    console.error('openAddRegModal error:', err);
                    alert('获取企业列表失败：' + err.message);
                }
            };

            const handleAddRegistration = async () => {
                if (!newReg.enterpriseId) { alert('请选择企业'); return; }
                const selected = enterpriseList.find(e => e.id === newReg.enterpriseId);
                const d = await apiFetch('/selection/registrations', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseId: newReg.enterpriseId,
                        enterpriseName: selected?.name || newReg.enterpriseName,
                        contactPerson: newReg.contactPerson,
                        contactPhone: newReg.contactPhone
                    })
                });
                if (d) {
                    setToast('已录入报名企业，待审核');
                    setShowAddRegModal(false);
                    setNewReg({ enterpriseId: '', enterpriseName: '', contactPerson: '', contactPhone: '' });
                    handleManageWorkflow(selectedAnnouncement);
                }
            };

            const reviewRegistration = async (reg, status) => {
                let reviewComments = '';
                if (status === '审核不通过') {
                    reviewComments = prompt('请输入审核不通过原因');
                    if (!reviewComments) return;
                }
                const d = await apiFetch(`/selection/registrations/${reg.id}/review`, {
                    method: 'PUT',
                    body: JSON.stringify({ status, reviewComments })
                });
                if (d) {
                    setToast(status === '审核通过' ? '报名企业审核通过' : '报名企业审核不通过');
                    handleManageWorkflow(selectedAnnouncement);
                }
            };

            // 步骤3: 确认考察企业
            const toggleCandidate = (enterpriseId) => {
                setSelectedCandidateIds(ids =>
                    ids.includes(enterpriseId) ? ids.filter(id => id !== enterpriseId) : [...ids, enterpriseId]
                );
            };

            const handleConfirmCandidates = async () => {
                const selectableIds = selectableCandidateRegistrations.map(r => r.enterpriseId);
                const defaultIds = selectedCandidateIds.length
                    ? selectedCandidateIds.filter(id => selectableIds.includes(id))
                    : selectableIds;
                const d = await apiFetch('/selection/candidates', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseIds: defaultIds
                    })
                });
                if (d) {
                    setToast('考察企业已确认');
                    const updated = { ...selectedAnnouncement, status: '考察中' };
                    setSelectedAnnouncement(updated);
                    handleManageWorkflow(updated);
                    loadData();
                }
            };

            // 步骤4: 考察记录
            const [showInspModal, setShowInspModal] = useState(false);
            const [inspData, setInspData] = useState({ enterpriseId: '', enterpriseName: '', inspectionTime: '', inspectionLocation: '', inspectors: '', inspectionResult: '', passed: null });

            const findInspectionForRegistration = (reg) => latestInspectionsByEnterprise.find(i =>
                i.announcementId === selectedAnnouncement?.id && i.enterpriseId === reg.enterpriseId
            );

            const openInspectionModal = (reg) => {
                const existingInspection = findInspectionForRegistration(reg);
                setInspectionForm(existingInspection || null);
                setInspData({
                    enterpriseId: reg.enterpriseId,
                    enterpriseName: reg.enterpriseName,
                    inspectionTime: existingInspection?.inspectionTime || new Date().toISOString().split('T')[0],
                    inspectionLocation: existingInspection?.inspectionLocation || '',
                    inspectors: existingInspection?.inspectors || '',
                    inspectionResult: existingInspection?.inspectionResult || '',
                    passed: existingInspection?.passed === true ? true : existingInspection?.passed === false ? false : null
                });
                setShowInspModal(true);
            };

            const handleSaveInspection = async () => {
                if (inspData.passed !== true && inspData.passed !== false) {
                    alert('考察结果为必填项');
                    return;
                }
                if (inspData.passed === false && !inspData.inspectionResult.trim()) {
                    alert('考察不通过时需填写原因');
                    return;
                }
                const method = inspectionForm ? 'PUT' : 'POST';
                const url = inspectionForm ? `/selection/inspections/${inspectionForm.id}` : '/selection/inspections';
                const payload = { ...inspData, announcementId: selectedAnnouncement.id };
                if (inspectionForm) { delete payload.enterpriseId; delete payload.enterpriseName; }
                const d = await apiFetch(url, { method, body: JSON.stringify(payload) });
                if (d) {
                    setToast('考察记录已保存');
                    setShowInspModal(false);
                    setInspectionForm(null);
                    handleManageWorkflow(selectedAnnouncement);
                }
            };

            const handleInspectionPass = async (inspId) => {
                const d = await apiFetch(`/selection/inspections/${inspId}/pass`, { method: 'POST', body: JSON.stringify({ comments: '考察通过' }) });
                if (d) { setToast('考察已通过'); handleManageWorkflow(selectedAnnouncement); }
            };

            const handleInspectionFail = async (inspId) => {
                const d = await apiFetch(`/selection/inspections/${inspId}/fail`, { method: 'POST', body: JSON.stringify({ comments: '考察不通过' }) });
                if (d) { setToast('考察未通过'); handleManageWorkflow(selectedAnnouncement); }
            };

            const toggleEmergencySupplement = (enterpriseId) => {
                setEmergencySupplementIds(ids =>
                    ids.includes(enterpriseId) ? ids.filter(id => id !== enterpriseId) : [...ids, enterpriseId]
                );
            };

            const handleEmergencySupplement = async () => {
                if (emergencyAcceptedRegistrations.length >= 5 && emergencySupplementIds.length < 5) {
                    alert('符合条件的应急备选报名供应商不少于5家时，补充考察企业不少于5家');
                    return;
                }
                if (emergencyAcceptedRegistrations.length < 5 && emergencySupplementIds.length !== emergencyAcceptedRegistrations.length) {
                    alert('符合条件的应急备选报名供应商少于5家时，应全部确定为补充考察企业');
                    return;
                }
                try {
                    const d = await apiFetch('/selection/candidates/emergency-supplement', {
                        method: 'POST',
                        body: JSON.stringify({
                            announcementId: selectedAnnouncement.id,
                            enterpriseIds: emergencySupplementIds
                        })
                    });
                    if (d) {
                        const updated = { ...selectedAnnouncement, status: '考察中' };
                        setToast('应急备选补充考察企业已确定');
                        setCandidates(prev => [d, ...prev.filter(c => c.id !== d.id)]);
                        setSelectedCandidateIds((d.confirmedEnterprises || []).map(e => e.enterpriseId));
                        setSelectedAnnouncement(updated);
                        handleManageWorkflow(updated);
                        loadData();
                    }
                } catch (err) {
                    if ((err.message || '').includes('已启用')) {
                        handleManageWorkflow(selectedAnnouncement);
                    }
                    alert(err.message || '应急备选补充考察企业确认失败');
                }
            };

            // 步骤5: 确定入围
            const [showShortlistModal, setShowShortlistModal] = useState(false);
            const [shortlistData, setShortlistData] = useState({ enterpriseIds: [], determinationTime: new Date().toISOString().split('T')[0] });

            const openShortlistModal = () => {
                setShortlistData({ enterpriseIds: passedInspections.map(i => i.enterpriseId), determinationTime: new Date().toISOString().split('T')[0] });
                setShowShortlistModal(true);
            };

            const handleConfirmShortlisted = async () => {
                if (shortlistData.enterpriseIds.length < 1) { alert('请选择入围企业'); return; }
                const d = await apiFetch('/selection/shortlisted', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        enterpriseIds: shortlistData.enterpriseIds
                    })
                });
                if (d) {
                    setToast('入围企业已确定');
                    setShowShortlistModal(false);
                    const updated = { ...selectedAnnouncement, status: '家长投票中' };
                    setSelectedAnnouncement(updated);
                    handleManageWorkflow(updated);
                    loadData();
                }
            };

            // 步骤6: 家长投票确定中标
            const [showResultModal, setShowResultModal] = useState(false);
            const [resultData, setResultData] = useState({ voteTime: '', voteLocation: '', parentAttendance: '', validVotes: 0, roundNo: 1, determinationBy: '家长代表', parentRepresentatives: '', voteResults: [] });

            const openResultModal = (revoteSource = null) => {
                const voteEnterprises = revoteSource?.revoteEnterprises?.length
                    ? revoteSource.revoteEnterprises
                    : shortlistedEnterprises;
                const voteRows = voteEnterprises.map(e => ({ enterpriseId: e.enterpriseId, enterpriseName: e.enterpriseName, votes: 0 }));
                setResultData({
                    voteTime: new Date().toISOString().split('T')[0],
                    voteLocation: '',
                    parentAttendance: '',
                    validVotes: 0,
                    roundNo: revoteSource ? Number(revoteSource.roundNo || 1) + 1 : 1,
                    determinationBy: '家长代表',
                    parentRepresentatives: '',
                    voteResults: voteRows
                });
                setShowResultModal(true);
            };

            const handleConfirmResult = async () => {
                try {
                    const d = await apiFetch('/selection/results', {
                        method: 'POST',
                        body: JSON.stringify({
                            announcementId: selectedAnnouncement.id,
                            voteResults: resultData.voteResults,
                            voteTime: resultData.voteTime,
                            voteLocation: resultData.voteLocation,
                            parentAttendance: resultData.parentAttendance,
                            validVotes: voteTotal(resultData.voteResults),
                            roundNo: resultData.roundNo,
                            determinationBy: resultData.determinationBy,
                            parentRepresentatives: resultData.parentRepresentatives.split(',').map(s => s.trim())
                        })
                    });
                    if (d) {
                        setShowResultModal(false);
                        if (d.status === '需二次投票') {
                            alert('首次家长投票结果已保存。因没有供餐企业有效得票超过有效投票50%，请组织得票最高的2家企业进行第二次家长投票。');
                            setToast('首次投票已存档，请点击第二次家长投票');
                            handleManageWorkflow(selectedAnnouncement);
                        } else {
                            setToast('中标结果已确定');
                            const updated = { ...selectedAnnouncement, status: '待签合同' };
                            setSelectedAnnouncement(updated);
                            handleManageWorkflow(updated);
                        }
                        loadData();
                    }
                } catch (err) {
                    alert(err.message || '投票结果提交失败');
                }
            };

            // 步骤7: 签订合同
            const [showContractModal, setShowContractModal] = useState(false);
            const [contractData, setContractData] = useState({ contractStartDate: '', contractEndDate: '', contractAmount: '', mealStandard: '', dinerCount: '', paymentTerms: '季度结算', remarks: '' });

            const openContractModal = () => {
                setContractData({ contractStartDate: new Date().toISOString().split('T')[0], contractEndDate: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], contractAmount: '', mealStandard: '', dinerCount: '', paymentTerms: '季度结算', remarks: '' });
                setShowContractModal(true);
            };

            const handleSignContract = async () => {
                const winner = finalResult?.winningEnterprise;
                const d = await apiFetch('/selection/contracts', {
                    method: 'POST',
                    body: JSON.stringify({
                        announcementId: selectedAnnouncement.id,
                        resultId: finalResult?.id,
                        enterpriseId: winner?.enterpriseId,
                        enterpriseName: winner?.enterpriseName,
                        ...contractData
                    })
                });
                if (d) {
                    setToast('遴选合同已创建，流程完成');
                    setShowContractModal(false);
                    const updated = { ...selectedAnnouncement, status: '已完成' };
                    setSelectedAnnouncement(updated);
                    handleManageWorkflow(updated);
                    loadData();
                }
            };

            const filtered = announcements.filter(a => {
                if (statusFilter && a.status !== statusFilter) return false;
                if (search && !a.title?.includes(search)) return false;
                return true;
            });

            return (
                <div className="page-container">
                    {toast && <div className="toast" onClick={() => setToast(null)}>{toast}</div>}
                    <div className="page-header">
                        <div><h2>公开遴选</h2></div>
                        <button className="btn-primary" onClick={handleCreate}>+ 发起遴选</button>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'announcements' ? 'active' : ''}`} onClick={() => setActiveTab('announcements')}>遴选项目管理 ({filtered.length})</button>
                    </div>

                    {activeTab === 'announcements' ? (
                        <>
                            <div className="filter-bar">
                                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                                    <option value="">全部状态</option>
                                    <option value="项目已立项">项目已立项</option>
                                    <option value="报名审核中">报名审核中</option>
                                    <option value="考察中">考察中</option>
                                    <option value="家长投票中">家长投票中</option>
                                    <option value="待签合同">待签合同</option>
                                    <option value="已完成">已完成</option>
                                </select>
                                <input type="text" placeholder="搜索项目名称..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            {loading ? <div className="loading">加载中...</div> : (
                                <table className="data-table">
                                    <thead><tr><th>项目编号</th><th>项目名称</th><th>服务类型</th><th>报名截止</th><th>状态</th><th>操作</th></tr></thead>
                                    <tbody>
                                        {filtered.map(a => (
                                            <tr key={a.id}>
                                                <td>{a.announcementNo}</td>
                                                <td>{a.title}</td>
                                                <td>{a.serviceType}</td>
                                                <td>{a.registrationDeadline}</td>
                                                <td><span className={`status-badge status-${a.status}`}>{a.status}</span></td>
                                                <td>
                                                    <button className="btn-small" onClick={() => handleEdit(a)}>查看</button>
                                                    <button className="btn-small btn-primary" onClick={() => handleManageWorkflow(a)}>{a.status === '已完成' ? '流程查看' : '流程管理'}</button>
                                                    {['项目已立项', '草稿'].includes(a.status) && <button className="btn-small btn-danger" onClick={() => handleDelete(a.id)}>删除</button>}
                                                </td>
                                            </tr>
