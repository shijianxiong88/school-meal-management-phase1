                                        ))}
                                        {filtered.length === 0 && <tr><td colSpan="6" className="empty">暂无公告</td></tr>}
                                    </tbody>
                                </table>
                            )}
                        </>
                    ) : (
                        <>
                            <div className="page-header" style={{marginBottom: '16px'}}>
                                <button className="btn" onClick={() => setActiveTab('announcements')}>← 返回</button>
                                <h3 style={{margin: '0'}}>{selectedAnnouncement?.title}</h3>
                                {selectedAnnouncement?.status !== '项目已立项' && selectedAnnouncement?.status !== '草稿' && selectedAnnouncement?.status !== '已完成' && (
                                    <button className="btn" onClick={rollbackWorkflow}>退回前一步</button>
                                )}
                            </div>
                            {isWorkflowViewOnly && <div className="alert alert-info">该遴选项目状态为已完成，仅支持流程查看，不能继续流程管理。</div>}

                            <SelectionWorkflowStepper currentStep={currentStep} />

                            {/* 步骤1: 校外供餐遴选工作小组登记 */}
                            {isExternalCateringSelection && (
                                <div className="workflow-section">
                                    <h4>① 校外供餐遴选工作小组登记</h4>
                                    <div className="info-item">
                                        <span>登记状态</span>
                                        <span className={`status-badge ${selectedAnnouncement?.workgroupRegisteredAt ? 'status-已完成' : 'status-项目已立项'}`}>
                                            {selectedAnnouncement?.workgroupRegisteredAt ? '已登记' : '未登记'}
                                        </span>
                                    </div>
                                    {selectedAnnouncement?.workgroupRegisteredAt && (
                                        <div className="info-item"><span>登记时间</span><span>{selectedAnnouncement.workgroupRegisteredAt.split('T')[0]}</span></div>
                                    )}
                                    <div className="form-row">
                                        <div className="form-group">
                                            <label>成员总人数 <span className="required">*</span></label>
                                            <input
                                                type="number"
                                                min="1"
                                                value={workgroupForm.memberCount}
                                                onChange={e => setWorkgroupForm({...workgroupForm, memberCount: e.target.value})}
                                                disabled={isWorkflowViewOnly}
                                                placeholder="请输入成员总人数"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>家长人数 <span className="required">*</span></label>
                                            <input
                                                type="number"
                                                min="0"
                                                value={workgroupForm.parentCount}
                                                onChange={e => setWorkgroupForm({...workgroupForm, parentCount: e.target.value})}
                                                disabled={isWorkflowViewOnly}
                                                placeholder="请输入家长人数"
                                            />
                                        </div>
                                    </div>
                                    <div className="info-item">
                                        <span>家长占比</span>
                                        <span>{workgroupMemberCount > 0 ? (workgroupParentRatio * 100).toFixed(1) + '%' : '-'}</span>
                                    </div>
                                    {!isWorkflowViewOnly && <button className="btn btn-primary" onClick={handleSaveWorkgroup}>保存工作小组登记</button>}
                                </div>
                            )}

                            {/* 步骤2: 发布公告 */}
                            <div className="workflow-section">
                                <h4>{isExternalCateringSelection ? '② 发布公告' : '① 发布公告'}</h4>
                                <div className="info-item"><span>项目状态</span><span className={`status-badge status-${selectedAnnouncement?.status}`}>{selectedAnnouncement?.status}</span></div>
                                <div className="info-item"><span>项目名称</span><span>{selectedAnnouncement?.title}</span></div>
                                <div className="info-item"><span>公告状态</span><span className={`status-badge status-${selectedAnnouncement?.status}`}>{selectedAnnouncement?.status}</span></div>
                                <div className="info-item"><span>发布时间</span><span>{selectedAnnouncement?.publishTime ? selectedAnnouncement.publishTime.split('T')[0] : '-'}</span></div>
                                <div className="info-item"><span>发布网址</span><span>{selectedAnnouncement?.publishUrl || '-'}</span></div>
                                {isExternalCateringSelection && !hasWorkgroupRegistration && <p className="form-hint">请先完成校外供餐遴选工作小组登记后再发布公告。</p>}
                                {!isWorkflowViewOnly && ['项目已立项', '草稿'].includes(selectedAnnouncement?.status) && (
                                    <button className="btn btn-primary" onClick={openPublishModal} disabled={!hasWorkgroupRegistration}>发起公告</button>
                                )}
                            </div>

                            {/* 步骤2: 学校录入并审核报名企业 */}
                            <div className="workflow-section">
                                <h4>② 学校录入并审核报名企业</h4>
                                <p>已报名企业：{registrations.length} 家</p>
                                {registrations.length > 0 && (
                                    <table className="data-table">
                                        <thead><tr><th>企业名称</th><th>联系人</th><th>联系电话</th><th>状态</th><th>原因</th><th>操作</th></tr></thead>
                                        <tbody>
                                            {registrations.map(r => <tr key={r.id}>
                                                <td>{formatRegisteredEnterpriseName(r)}</td>
                                                <td>{r.contactPerson}</td>
                                                <td>{r.contactPhone}</td>
                                                <td>{r.status}</td>
                                                <td>{r.reviewComments || '-'}</td>
                                                <td>
                                                    {!isWorkflowViewOnly && r.status === '待审核' && <button className="btn-small btn-primary" onClick={() => reviewRegistration(r, '审核通过')}>通过</button>}
                                                    {!isWorkflowViewOnly && r.status === '待审核' && <button className="btn-small btn-danger" onClick={() => reviewRegistration(r, '审核不通过')}>不通过</button>}
                                                </td>
                                            </tr>)}
                                        </tbody>
                                    </table>
                                )}
                                {!isWorkflowViewOnly && ['已发布', '报名审核中'].includes(selectedAnnouncement?.status) && (
                                    <button className="btn btn-primary" style={{marginTop: '12px'}} onClick={openAddRegModal}>+ 录入报名企业</button>
                                )}
                            </div>

                            {/* 步骤3: 确定考察企业 */}
                            {currentStep >= 2 && (
                                <div className="workflow-section">
                                    <h4>③ 确定考察企业</h4>
                                    <p>审核通过企业：{acceptedRegistrations.length} 家；当前可选企业：{selectableCandidateRegistrations.length} 家。可选企业大于 5 家时，按线下随机结果勾选不少于 5 家；不超过 5 家时全部勾选。</p>
                                    {isExternalCateringSelection && hasRegularAcceptedRegistration && <p>已有非应急备选企业报名，本环节只能从非应急备选企业中确定考察企业名单。</p>}
                                    {isExternalCateringSelection && acceptedRegistrations.length > 0 && !hasRegularAcceptedRegistration && <p>该校只有应急备选企业报名，可从应急备选企业中确定考察企业名单。</p>}
                                    {selectableCandidateRegistrations.map(r => (
                                        <label key={r.id} className="checkbox-label" style={{display: 'block', margin: '6px 0'}}>
                                            <input type="checkbox" checked={selectedCandidateIds.includes(r.enterpriseId)} onChange={() => toggleCandidate(r.enterpriseId)} />
                                            {r.enterpriseName}{emergencyEnterpriseIdSet.has(r.enterpriseId) ? '（应急备选）' : ''}
                                        </label>
                                    ))}
                                    {!isWorkflowViewOnly && ['报名审核中', '备选确认中'].includes(selectedAnnouncement?.status) && (
                                        <button className="btn btn-primary" onClick={handleConfirmCandidates}>确认考察企业</button>
                                    )}
                                </div>
                            )}

                            {/* 步骤4: 组织考察 */}
                            {currentStep >= 4 && (
                                <div className="workflow-section">
                                    <h4>④ 组织考察</h4>
                                    {candidateRegistrations.map(r => {
                                        const inspection = findInspectionForRegistration(r);
                                        const inspectionStatus = inspection
                                            ? inspection.passed === true ? '通过' : inspection.passed === false ? '不通过' : '未确认'
                                            : '';
                                        return (
                                            <div key={r.id} className="info-item">
                                                <span>{r.enterpriseName}{inspection ? `（${inspectionStatus}）` : ''}</span>
                                                {!isWorkflowViewOnly && <button className="btn-small btn-primary" onClick={() => openInspectionModal(r)}>{inspection ? '修改考察' : '记录考察'}</button>}
                                            </div>
                                        );
                                    })}
                                    {inspections.length > 0 && <p>考察通过：{passedInspections.length} 家</p>}
                                    {canEnableEmergencySupplement && (
                                        <div style={{marginTop: '16px', paddingTop: '16px', borderTop: '1px solid #e5e7eb'}}>
                                            <h4>应急备选补充考察</h4>
                                            <p className="form-hint">非应急考察企业不足3家且均不通过时，可从已报名且审核通过的应急备选供应商中产生补充考察企业。符合条件不少于5家时选择不少于5家；少于5家时全部选择。</p>
                                            <div className="form-group">
                                                <label>补充考察企业</label>
                                                {emergencyAcceptedRegistrations.map(r => (
                                                    <label key={r.id} className="checkbox-label" style={{display: 'block', margin: '6px 0'}}>
                                                        <input
                                                            type="checkbox"
                                                            checked={emergencySupplementIds.includes(r.enterpriseId)}
                                                            onChange={() => toggleEmergencySupplement(r.enterpriseId)}
                                                        />
                                                        {r.enterpriseName}（应急备选）
                                                    </label>
                                                ))}
                                            </div>
                                            {!isWorkflowViewOnly && <button className="btn btn-primary" onClick={handleEmergencySupplement}>确认应急备选补充考察企业</button>}
                                        </div>
                                    )}
                                    {!isWorkflowViewOnly && !canEnableEmergencySupplement && areCurrentCandidateInspectionsComplete && <button className="btn btn-primary" style={{marginTop: '12px'}} onClick={openShortlistModal}>确定入围企业</button>}
                                </div>
                            )}

                            {/* 步骤5: 确定入围 */}
                            {currentStep >= 5 && (
                                <div className="workflow-section">
                                    <h4>⑤ 确定入围企业</h4>
                                    <p>已入围 {shortlistedEnterprises.length} 家，入围企业至少 3 家。</p>
                                    {shortlistedEnterprises.map(e => <div key={e.enterpriseId} className="info-item"><span>{e.enterpriseName}</span></div>)}
                                </div>
                            )}

                            {/* 步骤6: 家长投票 */}
                            {currentStep >= 6 && (
                                <div className="workflow-section">
                                    <h4>⑥ 家长投票确定中标</h4>
                                    <p>确定方式：投票。供餐企业有效得票超过有效投票 50% 时直接中标；否则组织得票最高的 2 家企业重新投票。</p>
                                    {results.length > 0 && (
                                        <table className="data-table">
                                            <thead><tr><th>轮次</th><th>时间</th><th>地点</th><th>家长到位人数</th><th>有效票数</th><th>状态</th><th>结果</th></tr></thead>
                                            <tbody>
                                                {results.slice().reverse().map(r => (
                                                    <tr key={r.id}>
                                                        <td>第 {r.roundNo || 1} 轮</td>
                                                        <td>{r.voteTime || '-'}</td>
                                                        <td>{r.voteLocation || '-'}</td>
                                                        <td>{r.parentAttendance || '-'}</td>
                                                        <td>{r.validVotes || voteTotal(r.voteResults)}</td>
                                                        <td>{r.status || (r.winningEnterprise ? '已确定' : '-')}</td>
                                                        <td>{r.winningEnterprise ? `中标：${r.winningEnterprise.enterpriseName}` : `需二次投票：${(r.revoteEnterprises || []).map(e => e.enterpriseName).join('、')}`}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                    {finalResult ? (
                                        <p>中标企业：<strong>{finalResult.winningEnterprise?.enterpriseName}</strong></p>
                                    ) : (
                                        !isWorkflowViewOnly && !latestRevoteResult && <button className="btn btn-primary" onClick={() => openResultModal()}>录入首次投票结果</button>
                                    )}
                                    {!isWorkflowViewOnly && selectedAnnouncement?.status === '家长投票中' && latestRevoteResult && !finalResult && <button className="btn btn-primary" onClick={() => openResultModal(latestRevoteResult)}>第二次家长投票</button>}
                                </div>
                            )}

                            {/* 步骤7: 签订合同 */}
                            {currentStep >= 7 && (
                                <div className="workflow-section">
                                    <h4>⑦ 签订合同</h4>
                                    {!isWorkflowViewOnly && selectedAnnouncement?.status === '待签合同' && <button className="btn btn-primary" onClick={openContractModal}>签订遴选合同</button>}
                                    {selectedAnnouncement?.status === '已完成' && <p className="status-success">合同已签订</p>}
                                </div>
                            )}

                            {/* 步骤8: 完成 */}
                            {currentStep >= 8 && (
                                <div className="workflow-section">
                                    <h4>⑧ 遴选完成</h4>
                                    <p className="status-success">遴选流程已完成！</p>
                                </div>
                            )}
                        </>
                    )}

                    {/* 录入报名企业弹窗 */}
                    {showAddRegModal && (
                        <div className="modal-overlay" onClick={() => setShowAddRegModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>录入报名企业</h3><button className="close" onClick={() => setShowAddRegModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleAddRegistration(); }}>
                                    <div className="form-group">
                                        <label>选择企业 <span className="required">*</span></label>
                                        <select value={newReg.enterpriseId} onChange={e => { const ent = enterpriseList.find(x => x.id === e.target.value); setNewReg({...newReg, enterpriseId: e.target.value, enterpriseName: ent?.name || ''}); }} required>
                                            <option value="">请选择企业</option>
                                            {enterpriseList.map(ent => <option key={ent.id} value={ent.id}>{formatRegistrationEnterpriseName(ent)}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-group"><label>联系人</label><input type="text" value={newReg.contactPerson} onChange={e => setNewReg({...newReg, contactPerson: e.target.value})} placeholder="请输入联系人" /></div>
                                    <div className="form-group"><label>联系电话</label><input type="text" value={newReg.contactPhone} onChange={e => setNewReg({...newReg, contactPhone: e.target.value})} placeholder="请输入联系电话" /></div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowAddRegModal(false)}>取消</button><button type="submit" className="btn-primary">录入</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 考察记录弹窗 */}
                    {showInspModal && (
                        <div className="modal-overlay" onClick={() => setShowInspModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>考察记录 - {inspData.enterpriseName}</h3><button className="close" onClick={() => setShowInspModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleSaveInspection(); }}>
                                    <div className="form-group"><label>考察日期</label><input type="date" value={inspData.inspectionTime} onChange={e => setInspData({...inspData, inspectionTime: e.target.value})} /></div>
                                    <div className="form-group"><label>考察地点</label><input type="text" value={inspData.inspectionLocation} onChange={e => setInspData({...inspData, inspectionLocation: e.target.value})} placeholder="请输入考察地点" /></div>
                                    <div className="form-group"><label>考察人员</label><input type="text" value={inspData.inspectors} onChange={e => setInspData({...inspData, inspectors: e.target.value})} placeholder="请输入考察人员" /></div>
                                    <div className="form-group"><label>考察结论{inspData.passed === false && <span className="required"> *</span>}</label><textarea value={inspData.inspectionResult} onChange={e => setInspData({...inspData, inspectionResult: e.target.value})} rows="3" placeholder={inspData.passed === false ? '请输入考察不通过原因' : '请输入考察结论'} /></div>
                                    <div className="form-group"><label>考察结果 <span className="required">*</span></label><select required value={inspData.passed === null ? '' : inspData.passed ? 'true' : 'false'} onChange={e => setInspData({...inspData, passed: e.target.value === 'true' ? true : e.target.value === 'false' ? false : null})}><option value="">请选择</option><option value="true">通过</option><option value="false">不通过</option></select></div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowInspModal(false)}>取消</button><button type="submit" className="btn-primary">保存</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 入围弹窗 */}
                    {showShortlistModal && (
                        <div className="modal-overlay" onClick={() => setShowShortlistModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>确定入围企业</h3><button className="close" onClick={() => setShowShortlistModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleConfirmShortlisted(); }}>
                                    <div className="form-group">
                                        <label>入围企业</label>
                                        {passedInspections.map(i => (
                                            <label key={i.id} style={{display: 'block', margin: '6px 0'}}>
                                                <input type="checkbox" checked={shortlistData.enterpriseIds.includes(i.enterpriseId)} onChange={e => {
                                                    const ids = e.target.checked
                                                        ? [...shortlistData.enterpriseIds, i.enterpriseId]
                                                        : shortlistData.enterpriseIds.filter(id => id !== i.enterpriseId);
                                                    setShortlistData({...shortlistData, enterpriseIds: ids});
                                                }} />
                                                {i.enterpriseName}
                                            </label>
                                        ))}
                                    </div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowShortlistModal(false)}>取消</button><button type="submit" className="btn-primary">确认入围</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 家长投票弹窗 */}
                    {showResultModal && (
                        <div className="modal-overlay" onClick={() => setShowResultModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>{resultData.roundNo > 1 ? '二次投票结果' : '家长投票结果'}</h3><button className="close" onClick={() => setShowResultModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleConfirmResult(); }}>
                                    <div className="form-group"><label>确定方式</label><p className="form-hint">投票。有效得票必须超过有效投票 50%，否则只保留得票最高的 2 家重新投票。</p></div>
                                    <div className="form-row">
                                        <div className="form-group"><label>投票时间 <span className="required">*</span></label><input type="date" value={resultData.voteTime} onChange={e => setResultData({...resultData, voteTime: e.target.value})} required /></div>
                                        <div className="form-group"><label>投票地点 <span className="required">*</span></label><input type="text" value={resultData.voteLocation} onChange={e => setResultData({...resultData, voteLocation: e.target.value})} placeholder="请输入投票地点" required /></div>
                                    </div>
                                    <div className="form-row">
                                        <div className="form-group"><label>家长到位人数 <span className="required">*</span></label><input type="number" min="1" value={resultData.parentAttendance} onChange={e => setResultData({...resultData, parentAttendance: e.target.value})} required /></div>
                                        <div className="form-group"><label>有效票数</label><input type="number" value={voteTotal(resultData.voteResults)} disabled /></div>
                                    </div>
                                    {resultData.voteResults.map((row, idx) => (
                                        <div className="form-row" key={row.enterpriseId}>
                                            <div className="form-group"><label>入围企业</label><p className="form-hint">{row.enterpriseName}</p></div>
                                            <div className="form-group"><label>得票数</label><input type="number" min="0" value={row.votes} onChange={e => {
                                                const next = [...resultData.voteResults];
                                                next[idx] = {...row, votes: e.target.value};
                                                setResultData({...resultData, voteResults: next});
                                            }} /></div>
                                        </div>
                                    ))}
                                    <div className="form-group"><label>确定人员</label><input type="text" value={resultData.determinationBy} onChange={e => setResultData({...resultData, determinationBy: e.target.value})} placeholder="如：家长代表" /></div>
                                    <div className="form-group"><label>家长代表</label><input type="text" value={resultData.parentRepresentatives} onChange={e => setResultData({...resultData, parentRepresentatives: e.target.value})} placeholder="多个用逗号分隔" /></div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowResultModal(false)}>取消</button><button type="submit" className="btn-primary">确定</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 合同弹窗 */}
                    {showContractModal && (
                        <div className="modal-overlay" onClick={() => setShowContractModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>签订遴选合同</h3><button className="close" onClick={() => setShowContractModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handleSignContract(); }}>
                                    <div className="form-row"><div className="form-group"><label>合同开始日期</label><input type="date" value={contractData.contractStartDate} onChange={e => setContractData({...contractData, contractStartDate: e.target.value})} /></div><div className="form-group"><label>合同结束日期</label><input type="date" value={contractData.contractEndDate} onChange={e => setContractData({...contractData, contractEndDate: e.target.value})} /></div></div>
                                    <div className="form-row"><div className="form-group"><label>合同金额(万元)</label><input type="number" value={contractData.contractAmount} onChange={e => setContractData({...contractData, contractAmount: e.target.value})} placeholder="0" /></div><div className="form-group"><label>付款方式</label><select value={contractData.paymentTerms} onChange={e => setContractData({...contractData, paymentTerms: e.target.value})}><option value="季度结算">季度结算</option><option value="月结">月结</option><option value="半年结">半年结</option><option value="年结">年结</option></select></div></div>
                                    <div className="form-row"><div className="form-group"><label>餐标</label><input type="text" value={contractData.mealStandard} onChange={e => setContractData({...contractData, mealStandard: e.target.value})} placeholder="如：15元/人/餐" /></div><div className="form-group"><label>用餐人数</label><input type="number" min="0" value={contractData.dinerCount} onChange={e => setContractData({...contractData, dinerCount: e.target.value})} placeholder="0" /></div></div>
                                    <div className="form-group"><label>备注</label><textarea value={contractData.remarks} onChange={e => setContractData({...contractData, remarks: e.target.value})} rows="2" /></div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowContractModal(false)}>取消</button><button type="submit" className="btn-primary">签订合同</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showModal && <SelectionFormModal item={editData} onClose={() => setShowModal(false)} onSave={() => { setShowModal(false); loadData(); setToast('遴选项目已立项'); }} />}
                    {showPublishModal && (
                        <div className="modal-overlay" onClick={() => setShowPublishModal(false)}>
                            <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>发起公告</h3><button className="close" onClick={() => setShowPublishModal(false)}>×</button></div>
                                <form className="selection-form" onSubmit={e => { e.preventDefault(); handlePublish(selectedAnnouncement.id); }}>
                                    <div className="form-group"><label>公告标题 <span className="required">*</span></label><input type="text" value={publishForm.title} onChange={e => setPublishForm({...publishForm, title: e.target.value})} required /></div>
                                    <div className="form-group"><label>公告内容 <span className="required">*</span></label><textarea rows="4" value={publishForm.content} onChange={e => setPublishForm({...publishForm, content: e.target.value})} required /></div>
                                    <div className="form-row">
                                        <div className="form-group"><label>发布公告网址 <span className="required">*</span></label><input type="url" value={publishForm.publishUrl} onChange={e => setPublishForm({...publishForm, publishUrl: e.target.value})} required /></div>
                                        <div className="form-group"><label>报名截止日期 <span className="required">*</span></label><input type="date" value={publishForm.registrationDeadline} onChange={e => setPublishForm({...publishForm, registrationDeadline: e.target.value})} required /></div>
                                    </div>
                                    <div className="modal-footer"><button type="button" className="btn" onClick={() => setShowPublishModal(false)}>取消</button><button type="submit" className="btn-primary">发布公告</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============ Selection Workflow Stepper ============
        const STEPS = [
            { id: 1, label: '发布公告', key: '项目已立项' },
            { id: 2, label: '报名审核', key: '报名审核中' },
            { id: 3, label: '确定考察企业', key: 'candidates' },
            { id: 4, label: '组织考察', key: 'inspections' },
            { id: 5, label: '确定入围', key: 'shortlisted' },
            { id: 6, label: '家长投票', key: 'results' },
            { id: 7, label: '签订合同', key: 'contracts' },
            { id: 8, label: '完成', key: 'done' }
        ];

        function SelectionWorkflowStepper({ currentStep, onStepClick }) {
            return (
                <div className="workflow-stepper">
                    {STEPS.map((step, idx) => {
                        const isCompleted = currentStep > step.id;
                        const isCurrent = currentStep === step.id;
                        const isClickable = onStepClick && (isCompleted || isCurrent);
                        return (
                            <div key={step.id} className={`step-item ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}`}>
                                <div className="step-indicator" onClick={isClickable ? () => onStepClick(step.id) : undefined}>
                                    {isCompleted ? '✓' : step.id}
                                </div>
                                <div className="step-label">{step.label}</div>
                                {idx < STEPS.length - 1 && <div className={`step-line ${isCompleted ? 'completed' : ''}`} />}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ============ Selection Form Modal ============
        function SelectionFormModal({ item, onClose, onSave }) {
            const [form, setForm] = useState(item || { serviceType: '食材供应', canteenId: '', title: '', content: '', requirements: '', publishUrl: '', registrationDeadline: '' });
            const [canteens, setCanteens] = useState([]);
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const { user } = useAuth();

            useEffect(() => {
                if (form.serviceType === '食材供应') {
                    setLoading(true);
                    apiFetch('/canteens').then(d => {
                        if (d) {
                            // Filter canteens for school user
                            const myCanteens = d.filter(c => {
                                // For school users, filter by their schoolId
                                if (user?.role === 'school') {
                                    return c.schoolId === user?.schoolId || c.schoolId === user?.id;
                                }
                                return true;
                            });
                            setCanteens(myCanteens);
                        }
                        setLoading(false);
                    });
                }
            }, [form.serviceType, user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                try {
                    const method = item ? 'PUT' : 'POST';
                    const url = item ? `/selection/announcements/${item.id}` : '/selection/announcements';
                    const d = await apiFetch(url, { method, body: JSON.stringify(form) });
                    if (d) {
                        onSave();
                    } else {
                        alert('保存失败，请重试');
                    }
                } catch (err) {
                    alert('保存失败：' + err.message);
                }
                setSaving(false);
            };

            const handleServiceTypeChange = (newType) => {
                setForm({ ...form, serviceType: newType, canteenId: '' });
            };

            const isViewMode = !!item;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-lg" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>{item ? '查看遴选项目' : '发起遴选'}</h3>
                            <button className="close" onClick={onClose}>×</button>
                        </div>
                        <form onSubmit={handleSubmit} className="selection-form">
                            <div className="form-row">
                                <div className="form-group">
                                    <label>服务类型 <span className="required">*</span></label>
                                    <select
                                        value={form.serviceType}
                                        onChange={e => handleServiceTypeChange(e.target.value)}
                                        disabled={isViewMode}
                                        required
                                    >
                                        <option value="食材供应">食材供应</option>
                                        <option value="校外供餐">校外供餐</option>
                                    </select>
                                </div>
                                {form.serviceType === '食材供应' && (
                                    <div className="form-group">
                                        <label>所属食堂 <span className="required">*</span></label>
                                        {loading ? (
                                            <select disabled><option>加载中...</option></select>
                                        ) : (
                                            <select
                                                value={form.canteenId || ''}
                                                onChange={e => setForm({ ...form, canteenId: e.target.value })}
                                                disabled={isViewMode}
                                                required
                                            >
                                                <option value="">请选择食堂</option>
                                                {canteens.map(c => (
                                                    <option key={c.id} value={c.id}>
                                                        {c.name} ({c.operationMode})
                                                    </option>
                                                ))}
                                            </select>
                                        )}
                                    </div>
                                )}
                                {form.serviceType === '校外供餐' && (
                                    <div className="form-group">
                                        <label>说明</label>

                </div>
            );
        }

                                        {allWarnings.filter(c => activeTab === 'all' || c.warnLevel === activeTab).map(c => (

                                                <td><span className={`badge ${c.warnLevel === 'red' ? 'badge-red' : 'badge-yellow'}`}>

        // ============ Users Management Page ============
        function UsersPage() {
            const [users, setUsers] = useState([]);
            const [schools, setSchools] = useState([]);
            const [canteens, setCanteens] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editUser, setEditUser] = useState(null);
            const [userMode, setUserMode] = useState('view');
            const [showBatchModal, setShowBatchModal] = useState(false);
            const [toast, setToast] = useState(null);
            const [search, setSearch] = useState('');
            const { user: currentUser } = useAuth();
            const [activeTab, setActiveTab] = useState('all');
            const [expandedGroups, setExpandedGroups] = useState({ enterprise: false, school: false });

            const loadData = () => {
                setLoading(true);
                Promise.all([
                    apiFetch('/users'),
                    apiFetch('/schools'),
                    apiFetch('/canteens')
                ]).then(([d, s, c]) => {
                    if (d) setUsers(d);
                    if (s) setSchools(s);
                    if (c) setCanteens(c);
                    setLoading(false);
                });
            };
            useEffect(() => { loadData(); }, []);

            const handleSave = async (formData) => {
                try {
                    if (editUser) {
                        await apiFetch(`/users/${editUser.id}`, { method: 'PUT', body: JSON.stringify(formData) });
                        setToast({ message: '修改成功', type: 'success' });
                    } else {
                        await apiFetch('/users', { method: 'POST', body: JSON.stringify(formData) });
                        setToast({ message: '新增成功，初始密码为 123456', type: 'success' });
                    }
                    setShowModal(false);
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('确认删除该用户？')) return;
                try {
                    await apiFetch(`/users/${id}`, { method: 'DELETE' });
                    setToast({ message: '删除成功', type: 'success' });
                    loadData();
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleResetPassword = async (id) => {
                if (!confirm('确认重置密码为 123456？')) return;
                try {
                    await apiFetch(`/users/reset-password/${id}`, { method: 'POST' });
                    setToast({ message: '密码已重置为 123456', type: 'success' });
                } catch (e) {
                    setToast({ message: e.message, type: 'error' });
                }
            };

            const handleBatchImport = async (jsonData) => {
                // 已废弃，BatchImportModal 内部直接处理 API 调用
                setShowBatchModal(false);
                loadData();
            };

            const roleLabels = {
                admin: { label: '市级管理员', badge: 'badge-purple' },
                school: { label: '学校用户', badge: 'badge-blue' },
                ingredientSupplier: { label: '食材供应商', badge: 'badge-green' },
                cateringCompany: { label: '校外供餐企业', badge: 'badge-green' },
                operationSupplier: { label: '委托经营供应商', badge: 'badge-green' },
                serviceSupplier: { label: '委托服务提供商', badge: 'badge-green' },
            };

            const userGroups = {
                admin: { label: '市级用户', roles: ['admin'] },
                enterprise: {
                    label: '企业用户',
                    roles: ['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'],
                    children: {
                        ingredientSupplier: '食材供应商',
                        cateringCompany: '校外供餐企业',
                        operationSupplier: '委托经营供应商',
                        serviceSupplier: '委托服务提供商'
                    }
                },
                school: {
                    label: '学校用户',
                    roles: ['school'],
                    children: {
                        selfCanteen: '自办食堂学校',
                        delegateCanteen: '委托经营学校',
                        externalSupply: '校外供餐学校'
                    }
                }
            };

            const getSchoolType = (schoolId) => {
                const school = schools.find(s => s.id === schoolId);
                if (!school) return 'unknown';
                const schoolCanteens = canteens.filter(c => c.schoolId === schoolId && c.academicYear === '2025-2026');
                const hasExternal = (school.供餐类型 || []).includes('校外供餐');
                const selfOp = schoolCanteens.some(c => c.operationMode === '自营');
                const delegateOp = schoolCanteens.some(c => c.operationMode === '委托经营');
                if (hasExternal) return 'externalSupply';
                if (delegateOp) return 'delegateCanteen';
                if (selfOp) return 'selfCanteen';
                return 'unknown';
            };

            const toggleGroup = (key) => {
                setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const filtered = users.filter(u =>
                !search || u.name?.includes(search) || u.username?.includes(search) || (u.region && u.region.includes(search))
            );

            const getUserGroup = (user) => {
                if (user.role === 'admin') return 'admin';
                if (['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'].includes(user.role)) return 'enterprise';
                if (user.role === 'school') return 'school';
                return 'other';
            };

            const getSubGroup = (user) => {
                if (user.role === 'admin') return 'admin';
                if (['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'].includes(user.role)) return user.role;
                if (user.role === 'school') return getSchoolType(user.schoolId);
                return 'other';
            };

            const renderUsersByGroup = () => {
                if (loading) return <tr><td colSpan="6" style={{textAlign:'center',color:'#999',padding:'40px'}}>加载中...</td></tr>;

                const isSubTab = ['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier', 'selfCanteen', 'delegateCanteen', 'externalSupply'].includes(activeTab);
                const parentTab = isSubTab
                    ? (['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'].includes(activeTab) ? 'enterprise' : 'school')
                    : activeTab;

                let usersToRender = filtered;
                if (parentTab === 'admin') usersToRender = filtered.filter(u => u.role === 'admin');
                else if (parentTab === 'enterprise') {
                    const targetRole = isSubTab ? activeTab : null;
                    usersToRender = filtered.filter(u => ['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'].includes(u.role));
                    if (targetRole) usersToRender = usersToRender.filter(u => u.role === targetRole);
                } else if (parentTab === 'school') {
                    const targetType = isSubTab ? activeTab : null;
                    usersToRender = filtered.filter(u => u.role === 'school');
                    if (targetType) usersToRender = usersToRender.filter(u => getSchoolType(u.schoolId) === targetType);
                }

                if (usersToRender.length === 0) return <tr><td colSpan="6" style={{textAlign:'center',color:'#999',padding:'40px'}}>暂无数据</td></tr>;

                if (parentTab === 'all') {
                    const adminUsers = usersToRender.filter(u => u.role === 'admin');
                    const entUsers = usersToRender.filter(u => ['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'].includes(u.role));
                    const schUsers = usersToRender.filter(u => u.role === 'school');

                    const rows = [];
                    if (adminUsers.length > 0) {
                        rows.push(<tr key="group-admin-header"><td colSpan="6" className="user-group-header">市级用户</td></tr>);
                        adminUsers.forEach(u => rows.push(renderUserRow(u)));
                    }

                    const entSubGroups = ['ingredientSupplier', 'cateringCompany', 'operationSupplier', 'serviceSupplier'];
                    const entGroups = {};
                    entSubGroups.forEach(sg => { entGroups[sg] = entUsers.filter(u => u.role === sg); });
                    const hasEnt = Object.values(entGroups).some(g => g.length > 0);
                    if (hasEnt) {
                        rows.push(<tr key="group-enterprise-header"><td colSpan="6" className="user-group-header">企业用户</td></tr>);
                        entSubGroups.forEach(sg => {
                            if (entGroups[sg].length > 0) {
                                rows.push(<tr key={`group-ent-${sg}`}><td colSpan="6" className="user-sub-group-header">{userGroups.enterprise.children[sg]}</td></tr>);
                                entGroups[sg].forEach(u => rows.push(renderUserRow(u)));
                            }
                        });
                    }

                    const schSubGroups = ['selfCanteen', 'delegateCanteen', 'externalSupply'];
                    const schGroups = {};
                    schSubGroups.forEach(sg => { schGroups[sg] = schUsers.filter(u => getSchoolType(u.schoolId) === sg); });
                    const hasSch = Object.values(schGroups).some(g => g.length > 0);
                    if (hasSch) {
                        rows.push(<tr key="group-school-header"><td colSpan="6" className="user-group-header">学校用户</td></tr>);
                        schSubGroups.forEach(sg => {
                            if (schGroups[sg].length > 0) {
                                rows.push(<tr key={`group-sch-${sg}`}><td colSpan="6" className="user-sub-group-header">{userGroups.school.children[sg]}</td></tr>);
                                schGroups[sg].forEach(u => rows.push(renderUserRow(u)));
                            }
                        });
                    }
                    return rows;
                }

                return usersToRender.map(u => renderUserRow(u));
            };

            const renderUserRow = (u) => (
                <tr key={u.id}>
                    <td>{u.username}</td>
                    <td>{u.name}</td>
                    <td>
                        <span className={`badge ${roleLabels[u.role]?.badge || 'badge-gray'}`}>
                            {roleLabels[u.role]?.label || u.role}
                        </span>
                    </td>
                    <td>{u.region || '-'}</td>
                    <td>{u.createdAt ? new Date(u.createdAt).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <div className="btn-group">
                            <button className="btn btn-secondary btn-sm" onClick={() => { setEditUser(u); setShowModal(true); }}>查看</button>
                            <button className="btn btn-secondary btn-sm" onClick={() => { setEditUser(u); setShowModal(true); setUserMode('edit'); }}>编辑</button>
                            <button className="btn btn-secondary btn-sm" onClick={() => handleResetPassword(u.id)}>重置密码</button>
                            {u.role !== 'admin' && (
                                <button className="btn btn-danger btn-sm" onClick={() => handleDelete(u.id)}>删除</button>
                            )}
                        </div>
                    </td>
                </tr>
            );

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <div className="page-title">用户管理</div>
                            <div className="page-breadcrumb">共 {users.length} 个用户</div>
                        </div>
                        <div className="btn-group">
                            {currentUser?.role === 'admin' && <button className="btn btn-secondary" onClick={() => setShowBatchModal(true)}>批量导入</button>}
                            {currentUser?.role === 'admin' && <button className="btn btn-primary" onClick={() => { setEditUser(null); setShowModal(true); }}>+ 新增用户</button>}
                        </div>
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <div className="filter-bar">
                                <input className="search-input" placeholder="搜索用户名/名称/区域..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="user-group-tabs">
                                <button className={`user-group-tab ${activeTab === 'all' ? 'active' : ''}`} onClick={() => setActiveTab('all')}>全部</button>
                                <button className={`user-group-tab ${activeTab === 'admin' ? 'active' : ''}`} onClick={() => setActiveTab('admin')}>市级用户</button>
                                <button className={`user-group-tab ${activeTab === 'enterprise' ? 'active' : ''}`} onClick={() => setActiveTab('enterprise')}>
                                    企业用户 {expandedGroups.enterprise ? '▲' : '▼'}
                                </button>
                                {activeTab === 'enterprise' && expandedGroups.enterprise && (
                                    <div className="user-sub-tabs">
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('enterprise')}>全部企业</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('ingredientSupplier')}>食材供应商</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('cateringCompany')}>校外供餐企业</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('operationSupplier')}>委托经营供应商</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('serviceSupplier')}>委托服务提供商</button>
                                    </div>
                                )}
                                {activeTab !== 'enterprise' && (
                                    <button className={`user-group-tab`} onClick={() => { setActiveTab('enterprise'); toggleGroup('enterprise'); }} style={{display:'none'}}>企业用户 ▼</button>
                                )}
                                <button className={`user-group-tab ${activeTab === 'school' ? 'active' : ''}`} onClick={() => setActiveTab('school')}>
                                    学校用户 {expandedGroups.school ? '▲' : '▼'}
                                </button>
                                {activeTab === 'school' && expandedGroups.school && (
                                    <div className="user-sub-tabs">
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('school')}>全部学校</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('selfCanteen')}>自办食堂学校</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('delegateCanteen')}>委托经营学校</button>
                                        <button className={`user-sub-tab`} onClick={() => setActiveTab('externalSupply')}>校外供餐学校</button>
                                    </div>
                                )}
                                {activeTab !== 'school' && (
                                    <button className={`user-group-tab`} onClick={() => { setActiveTab('school'); toggleGroup('school'); }} style={{display:'none'}}>学校用户 ▼</button>
                                )}
                            </div>
                            <div className="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>用户名</th>
                                            <th>用户名称</th>
                                            <th>角色</th>
                                            <th>所属区域</th>
                                            <th>创建时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {renderUsersByGroup()}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    {showModal && <UserModal data={editUser} defaultMode={userMode} onSave={handleSave} onClose={() => setShowModal(false)} />}
                    {showBatchModal && <BatchImportModal onClose={() => setShowBatchModal(false)} />}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function UserModal({ data, defaultMode, onSave, onClose }) {

            const [mode, setMode] = useState(() => {
                if (!data) return 'edit';
                return defaultMode === 'edit' ? 'edit' : 'view';
            });
            const isView = mode === 'view';

            const roleLabels = {
                school: '学校用户',
                ingredientSupplier: '食材供应商',
                cateringCompany: '校外供餐企业',
                operationSupplier: '委托经营供应商',
                serviceSupplier: '委托服务提供商',
            };

            const handleSubmit = (e) => { e.preventDefault(); onSave(form); };

            const getDisplayValue = (val) => (val !== undefined && val !== null && val !== '') ? String(val) : '—';

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">

                            <div style={{display:'flex',gap:8,alignItems:'center'}}>

                                    <button type="button" className={`btn btn-sm ${isView ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setMode(isView ? 'edit' : 'view')}>
                                        {isView ? '编辑' : '查看'}

                                <button className="modal-close" onClick={onClose}>×</button>
                            </div>
                        </div>
                        <form onSubmit={handleSubmit}>
                            <div className="modal-body">
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>用户名（单位名称）</label>
                                        {isView ? <div className="modal-field-view">{form.username}</div> : <input value={form.username} onChange={e => setForm({...form, username: e.target.value})} required disabled={!!data} placeholder="例：晋江市第一中学" />}
                                    </div>
                                    <div className="form-group">
                                        <label>用户名称（显示名）</label>
                                        {isView ? <div className="modal-field-view">{getDisplayValue(form.name)}</div> : <input value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="例：晋江市第一中学" />}
                                    </div>
                                    <div className="form-group">
                                        <label>角色</label>
                                        {isView ? <div className="modal-field-view">{roleLabels[form.role] || form.role}</div> : (
                                            <select value={form.role} onChange={e => setForm({...form, role: e.target.value})} required disabled={!!data}>
                                                <option value="school">学校用户</option>
                                                <option value="ingredientSupplier">食材供应商</option>
                                                <option value="cateringCompany">校外供餐企业</option>
                                                <option value="operationSupplier">委托经营供应商</option>
                                                <option value="serviceSupplier">委托服务提供商</option>
                                            </select>
                                        )}
                                    </div>
                                    <div className="form-group">
                                        <label>所属区域</label>
                                        {isView ? <div className="modal-field-view">{getDisplayValue(form.region)}</div> : <input value={form.region || ''} onChange={e => setForm({...form, region: e.target.value})} placeholder="例：青阳街道" />}
                                    </div>
                                </div>
                                {!data && !isView && <p style={{fontSize:12,color:'#888',marginTop:8}}>新增用户初始密码为：<strong>123456</strong></p>}
                            </div>
                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>关闭</button>
                                {!isView && <button type="submit" className="btn btn-primary">保存</button>}
                            </div>
                        </form>
                    </div>
                </div>
            );

        function BatchImportModal({ onClose }) {
            const [mode, setMode] = useState('excel'); // 'excel' or 'json'
            const [jsonText, setJsonText] = useState('');
            const [file, setFile] = useState(null);
            const [error, setError] = useState('');
            const [uploading, setUploading] = useState(false);

            const handleFileChange = (e) => {
                const f = e.target.files[0];
                if (f) {
                    const ext = f.name.split('.').pop().toLowerCase();
                    if (!['xlsx', 'xls'].includes(ext)) {
                        setError('仅支持 .xlsx 或 .xls 文件');
                        setFile(null);
                    } else {
                        setError('');
                        setFile(f);
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setUploading(true);

                try {
                    if (mode === 'excel') {
                        if (!file) { setError('请选择 Excel 文件'); setUploading(false); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        const token = localStorage.getItem('token');

        // 解析OCR文本提取证照信息
        // 解析OCR文本提取证照信息
        function parseLicenseInfo(text) {
            const result = {
                name: '',
                licenseNo: '',
                type: '',
                legalPerson: '',
                validFrom: '',
                validUntil: '',
                businessScope: ''
            };

            if (!text) return result;

            console.log('开始解析OCR文本:', text);

            // 清理文本：统一全角半角符号
            const cleanText = text.replace(/[：:]/g, ':').replace(/，/g, ',').replace(/。/g, '.');

            // 证照类型识别（仅三种）
            if (/食品经营/.test(cleanText)) {
                result.type = '食品经营许可证';
            } else if (/营业执照/.test(cleanText)) {
                result.type = '营业执照';
            } else {
                result.type = '其他';
            }

            // 法人识别
            const personPatterns = [
                /(?:法定代表人|法人代表|法人)[:\s]*([^\n,，,.。]+)/i,
            ];
            for (const p of personPatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.legalPerson = match[1].trim();
                    break;
                }
            }

            // 证照编号识别 - 统一社会信用代码（18位）
            const licenseNoPatterns = [
                /([0-9A-Z]{18})/,           // 18位统一社会信用代码
            ];
            for (const p of licenseNoPatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.licenseNo = match[1];
                    break;
                }
            }

            // 名称识别 - 多种模式
            const namePatterns = [
                /(?:名称|Name|名字)[:\s]*([^\n,，,.。]+)/i,
                /([\u4e00-\u9fa5]{5,30}(?:有限公司|股份有限公司|集团|企业))/
            ];
            for (const p of namePatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.name = match[1].trim();
                    break;
                }
            }

            // 转换中文日期到ISO格式
            const convertDate = (str) => {
                if (!str || str === '长期') return str || '';
                let d = str.replace(/年/g, '-').replace(/月/g, '-').replace(/日/g, '');
                d = d.replace(/-+/g, '-').replace(/-$/, '');
                return d;
            };

            // 有效期识别 - 查找营业期限字段
            const termPatterns = [
                /(?:营业期限|有效期|validity)[:\s]*([0-9\u4e00-\u9fa5\-至]+)/i,
                /(?:营业期限|有效期)[:\s]*([0-9年\-月日]+)\s*至\s*([0-9年\-月日长期]+)/
            ];

            for (const tp of termPatterns) {
                const termMatch = cleanText.match(tp);
                if (termMatch) {
                    console.log('找到期限匹配:', termMatch[0]);
                    if (termMatch[2]) {
                        // 有两个日期
                        result.validFrom = convertDate(termMatch[1]);
                        result.validUntil = convertDate(termMatch[2]);
                    } else if (termMatch[1]) {
                        // 单个日期范围文本
                        const rangeMatch = termMatch[1].match(/([0-9年\-月日]+)\s*至?\s*([0-9年\-月日长期]+)?/);
                        if (rangeMatch) {
                            result.validFrom = convertDate(rangeMatch[1]);
                            result.validUntil = rangeMatch[2] ? convertDate(rangeMatch[2]) : '';
                        }
                    }
                    break;
                }
            }

            // 如果没有找到营业期限，尝试其他日期模式
            if (!result.validFrom || !result.validUntil) {
                const datePatterns = [
                    /([2][0][0-9][0-9][-\/][0-1][0-9][-\/][0-3][0-9])/g,
                    /([2][0][0-9][0-9]年[0-1]?[0-9]月[0-3]?[0-9]日)/g
                ];

                const allDates = [];
                for (const dp of datePatterns) {
                    let match;
                    const regex = new RegExp(dp.source, dp.flags);
                    while ((match = regex.exec(cleanText)) !== null) {
                        const d = convertDate(match[1]);
                        if (d && d !== '长期' && d.length >= 8) allDates.push(d);
                    }
                }

                if (allDates.length >= 2) {
                    const uniqueDates = [...new Set(allDates)].sort();
                    if (!result.validFrom) result.validFrom = uniqueDates[0];
                    if (!result.validUntil) result.validUntil = uniqueDates[uniqueDates.length - 1];
                }
            }

            // 经营范围识别
            const scopePatterns = [
                /(?:经营范围|业务范围|许可范围)[:\s]*([^\n]+)/i
            ];
            for (const p of scopePatterns) {
                const match = cleanText.match(p);
                if (match) {
                    result.businessScope = match[1].trim().substring(0, 200);
                    console.log('识别到经营范围:', result.businessScope);
                    break;
                }
            }

            console.log('解析结果:', result);
            return result;
        }

        function EnterpriseLicenseCreateWizard({ user, onSave, onClose }) {
            const isAdmin = user?.role === 'admin';
            const [step, setStep] = useState(1);
            const [fileInfo, setFileInfo] = useState(null);
            const [previewUrl, setPreviewUrl] = useState('');
            const [fieldSources, setFieldSources] = useState({});
            const [modifiedFields, setModifiedFields] = useState({});
            const [recognizedText, setRecognizedText] = useState('');
            const [enterpriseOptions, setEnterpriseOptions] = useState([]);
            const [ocring, setOcring] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [toast, setToast] = useState(null);
            const [form, setForm] = useState({
                enterpriseId: '',
                enterpriseType: '',
                type: '',
                licenseNo: '',
                enterpriseName: isAdmin ? '' : (user?.name || ''),
                legalPerson: '',
                address: '',
                validFrom: '',
                validUntil: '',
                isLongTerm: false,
                issueAuthority: '',
                issueDate: '',
                businessScope: '',
                establishDate: '',
                registeredCapital: '',
                subjectType: '',
                supervisionAgency: '',
                imageUrl: ''
            });

            useEffect(() => {
                if (!isAdmin) return;
                const sources = [
                    ['/ingredient-suppliers', '食材供应商'],
                    ['/catering-companies', '校外供餐企业'],
                    ['/operation-suppliers', '委托经营供应商'],
                    ['/service-suppliers', '委托服务提供商']
                ];
                Promise.all(sources.map(([path, type]) =>
                    apiFetch(path)
                        .then(list => (Array.isArray(list?.data) ? list.data : (Array.isArray(list) ? list : [])).map(item => ({
                            id: item.id,
                            name: item.name,
                            type
                        })))
                        .catch(() => [])
                )).then(groups => setEnterpriseOptions(groups.flat().filter(item => item.id && item.name)));
            }, [isAdmin]);

            const steps = ['上传原件', '识别核对', '确认保存'];

            const setField = (key, value) => {
                setForm(f => ({ ...f, [key]: value }));
                setModifiedFields(m => ({ ...m, [key]: true }));
            };

            const handleEnterpriseChange = (enterpriseId) => {
                const selected = enterpriseOptions.find(item => item.id === enterpriseId);
                setForm(f => ({
                    ...f,
                    enterpriseId,
                    enterpriseName: selected?.name || '',
                    enterpriseType: selected?.type || ''
                }));
                setModifiedFields(m => ({ ...m, enterpriseId: true, enterpriseName: true }));
            };

            const fieldMeta = (key, required) => {
                if (modifiedFields[key]) return <div className="license-field-meta modified">已修改</div>;
                if (fieldSources[key] === 'ocr' && form[key]) return <div className="license-field-meta recognized">已识别</div>;
                if (required && !form[key]) return <div className="license-field-meta required">需补充</div>;
                return null;
            };

            const applyOcrFields = (payload) => {
                const fields = payload.fields || {};
                const nextSources = {};
                setForm(current => {
                    const next = { ...current };
                    Object.keys(fields).forEach(key => {
                        if (fields[key] !== undefined && fields[key] !== '' && !modifiedFields[key]) {
                            next[key] = fields[key];
                            nextSources[key] = 'ocr';
                        }
                    });
                    if (payload.suggestedType && !modifiedFields.type) {
                        next.type = payload.suggestedType;
                        nextSources.type = 'ocr';
                    }
                    return next;
                });
                setFieldSources(s => ({ ...s, ...nextSources }));
                setRecognizedText(payload.recognizedText || '');
            };

            const runOcr = async (imageUrl, preferredType = '') => {
                setOcring(true);
                try {
                    const res = await fetch('/api/enterprise-licenses/ocr', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('token')
                        },
                        body: JSON.stringify({ imageUrl, preferredType })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'OCR识别失败');
                    applyOcrFields(data);
                    setToast({ message: '识别完成，请核对后保存', type: 'success' });
                } catch (err) {
                    setToast({ message: '识别失败，可手工完善后保存', type: 'error' });
                }
                setOcring(false);
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (isAdmin && !form.enterpriseId) {
                    setToast({ message: '请先选择所属企业', type: 'error' });
                    e.target.value = '';
                    return;
                }
                setUploading(true);
                setFileInfo({ name: file.name, type: file.type, size: file.size });
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = ev => setPreviewUrl(ev.target.result);
                    reader.readAsDataURL(file);
                } else {
                    setPreviewUrl('');
                }

                try {
                    const data = new FormData();
                    data.append('file', file);
                    const res = await fetch('/api/enterprise-licenses/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                        body: data
                    });
                    const uploaded = await res.json();
                    if (!res.ok) throw new Error(uploaded.error || '上传失败');
                    setForm(f => ({ ...f, imageUrl: uploaded.url }));
                    setStep(2);
                    await runOcr(uploaded.url);
                } catch (err) {
                    setToast({ message: err.message || '上传失败', type: 'error' });

                setUploading(false);
            };

            const handleTypeChange = async (type) => {
                const hasManualEdits = Object.keys(modifiedFields).some(k => k !== 'type' && modifiedFields[k]);
                if (hasManualEdits && !confirm('切换证照类型会按新类型重新识别，已手动修改字段将保留。是否继续？')) return;
                setField('type', type);
                if (form.imageUrl) await runOcr(form.imageUrl, type);
            };

            const validateBeforeConfirm = () => {
                if (isAdmin && !form.enterpriseId) return '请选择所属企业';
                if (!form.imageUrl) return '请先上传证照文件';
                if (!form.type) return '请选择证照类型';
                if (!form.licenseNo) return '请填写证照编号';
                if (!form.enterpriseName) return '请填写企业名称';
                if (!form.legalPerson) return '请填写法定代表人/负责人';
                if (!form.address) return '请填写住所/经营场所';
                if (form.type === '食品经营许可证' && !form.validUntil) return '请填写食品经营许可证有效期止';
                if (form.type === '食品经营许可证' && !form.subjectType) return '请填写主体业态';
                if (form.type === '食品经营许可证' && !form.businessScope) return '请填写经营项目';
                return '';
            };

            const goConfirm = () => {

                    setToast({ message: error, type: 'error' });

            };

            const submit = async () => {

                    </div>
                    <div className="form-group">

                        <input value={form.legalPerson} onChange={e => setField('legalPerson', e.target.value)} required />
                        {fieldMeta('legalPerson', true)}
                    </div>
                    <div className="form-group full">
                        <label>{form.type === '食品经营许可证' ? '住所/经营场所 *' : '住所 *'}</label>

            const renderSummary = () => (

                            {step === 2 && (
                                <div className="license-review-layout">
                                    {renderPreview()}
